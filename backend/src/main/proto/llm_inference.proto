syntax = "proto3";

package scrapalot.llm;

import "common.proto";

option java_multiple_files = true;
option java_package = "com.scrapalot.backend.grpc.llm";
option java_outer_classname = "LlmInferenceServiceProto";

// LLM Inference Service — model management, GPU operations, provider sync
service LlmInferenceService {
  // Model listing
  rpc ListDatabaseModels(ListDatabaseModelsRequest) returns (ListDatabaseModelsResponse);
  rpc ListProviderModels(ListProviderModelsRequest) returns (GroupedProviderModelsResponse);
  rpc ListEmbeddingModels(scrapalot.common.Empty) returns (EmbeddingModelsResponse);
  rpc GetFeaturedModels(FeaturedModelsRequest) returns (FeaturedModelsResponse);
  rpc GetInstalledModels(scrapalot.common.Empty) returns (InstalledModelsResponse);

  // Service status
  rpc GetStatus(scrapalot.common.Empty) returns (LlmStatusResponse);
  rpc GetSystemCapabilities(scrapalot.common.Empty) returns (SystemCapabilitiesResponse);
  rpc GetDeploymentStatus(scrapalot.common.Empty) returns (DeploymentStatusResponse);

  // Config
  rpc GetConfig(scrapalot.common.Empty) returns (LlmConfigResponse);
  rpc SetConfig(LlmConfigRequest) returns (scrapalot.common.StatusResponse);

  // Service lifecycle
  rpc StartService(scrapalot.common.Empty) returns (scrapalot.common.StatusResponse);
  rpc StopService(scrapalot.common.Empty) returns (scrapalot.common.StatusResponse);
  rpc RestartService(scrapalot.common.Empty) returns (scrapalot.common.StatusResponse);
  rpc ReinitializeLocalModels(scrapalot.common.Empty) returns (scrapalot.common.StatusResponse);

  // Model operations
  rpc DownloadModel(DownloadModelRequest) returns (scrapalot.common.StatusResponse);
  rpc DeleteModel(DeleteModelRequest) returns (scrapalot.common.StatusResponse);
  rpc UndeployModel(UndeployModelRequest) returns (scrapalot.common.StatusResponse);
  rpc GetLocalModelStatus(LocalModelStatusRequest) returns (LocalModelStatusResponse);

  // GPU operations
  rpc StartModelGpu(StartGpuRequest) returns (scrapalot.common.StatusResponse);
  rpc StopModelGpu(StopGpuRequest) returns (scrapalot.common.StatusResponse);
  rpc GetGpuStatus(GpuStatusRequest) returns (GpuStatusResponse);
  rpc GetOverallGpuStatus(scrapalot.common.Empty) returns (GpuStatusResponse);

  // Provider sync
  rpc RefreshProviderModels(scrapalot.common.Empty) returns (scrapalot.common.StatusResponse);
  rpc FetchProviderModels(scrapalot.common.Empty) returns (scrapalot.common.StatusResponse);

  // Download progress (streaming)
  rpc GetDownloadProgress(DownloadProgressRequest) returns (stream DownloadProgressChunk);
}

// Model listing
message ListDatabaseModelsRequest {
  string provider_id = 1;
  int32 page = 2;
  int32 limit = 3;
}

message ListDatabaseModelsResponse {
  string models_json = 1; // JSON: {models: [...], pagination: {...}}
}

message ListProviderModelsRequest {
  repeated string providers = 1;
  string model_type = 2;
  string search = 3;
  int32 page = 4;
  int32 limit = 5;
  bool refresh = 6;
}

message GroupedProviderModelsResponse {
  string response_json = 1; // Full JSON response (complex nested structure)
}

message EmbeddingModelsResponse {
  string models_json = 1;
}

// Wire-compatible with the old Empty request: all fields are optional, so a
// 0-byte Empty payload parses as "no filters" (proto3 defaults).
message FeaturedModelsRequest {
  optional string search = 1;          // HuggingFace search query
  optional int32 min_parameters = 2;   // min model size in billions
  optional int32 max_parameters = 3;   // max model size in billions
}

message FeaturedModelsResponse {
  string models_json = 1;
}

message InstalledModelsResponse {
  string models_json = 1;
}

// Status
message LlmStatusResponse {
  string status_json = 1;
}

message SystemCapabilitiesResponse {
  bool gpu_available = 1;
  string cuda_version = 2;
  string capabilities_json = 3;
}

message DeploymentStatusResponse {
  string status_json = 1;
}

// Config
message LlmConfigResponse {
  string config_json = 1;
}

message LlmConfigRequest {
  string config_json = 1;
}

// Model operations
message DownloadModelRequest {
  string model_name = 1;
  string provider = 2;
}

message DeleteModelRequest {
  string model_name = 1;
}

message UndeployModelRequest {
  string model_name = 1;
}

message LocalModelStatusRequest {
  string model_name = 1;
}

message LocalModelStatusResponse {
  string status_json = 1;
}

// GPU operations
message StartGpuRequest {
  string model_name = 1;
  string config_json = 2;
}

message StopGpuRequest {
  string model_name = 1;
}

message GpuStatusRequest {
  string model_name = 1; // empty for overall status
}

message GpuStatusResponse {
  string status_json = 1;
}

// Download progress
message DownloadProgressRequest {
  string model_name = 1;
}

message DownloadProgressChunk {
  double progress = 1;
  double speed = 2;
  string eta = 3;
  string status = 4;
  string message = 5;
}
