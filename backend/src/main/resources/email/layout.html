<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0e1a;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;-webkit-font-smoothing:antialiased;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:linear-gradient(180deg,#111a2e 0%,#0a0e1a 40%,#070a12 100%);background-color:#0a0e1a;">
    <tr><td align="center" style="padding:40px 16px;">

      <!-- Outer container -->
      <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

        <!-- Logo header -->
        <tr><td align="center" style="padding:0 0 32px;">
          <a href="{{baseUrl}}" style="text-decoration:none;">
            <img src="https://scrapalot.app/providers/scrapalot.png" alt="Scrapalot" width="56" height="56" style="border-radius:50%;display:block;margin:0 auto 12px;">
            <span style="color:#fafafa;font-size:20px;font-weight:700;letter-spacing:-0.3px;">Scrapalot AI</span>
          </a>
        </td></tr>

        <!-- Content card (sharp corners) -->
        <tr><td style="background:#18181b;border:1px solid #27272a;overflow:hidden;">
          {{content}}
        </td></tr>

        <!-- Signature -->
        <tr><td style="padding:32px 0 0;">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="border-top:1px solid #27272a;">
            <tr><td style="padding:20px 0 0;">
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td width="44" valign="top" style="padding-right:14px;">
                    <a href="{{baseUrl}}" style="text-decoration:none;"><img src="https://scrapalot.app/providers/scrapalot.png" alt="Scrapalot AI" width="44" height="44" style="border-radius:50%;display:block;"></a>
                  </td>
                  <td valign="top">
                    <p style="margin:0;color:#fafafa;font-size:14px;font-weight:700;letter-spacing:-0.2px;">Scrapalot AI</p>
                    <p style="margin:2px 0 0;color:#a1a1aa;font-size:12px;line-height:1.5;">AI Research Assistant — talk to your documents, run deep research, and explore knowledge graphs.</p>
                    <p style="margin:8px 0 0;font-size:12px;line-height:1.6;">
                      <a href="mailto:hello@mail.scrapalot.app" style="color:#818cf8;text-decoration:none;">hello@mail.scrapalot.app</a>
                      <span style="color:#3f3f46;">&nbsp;&middot;&nbsp;</span>
                      <a href="{{baseUrl}}" style="color:#818cf8;text-decoration:none;">scrapalot.app</a>
                    </p>
                  </td>
                </tr>
              </table>
            </td></tr>
          </table>
        </td></tr>

        <!-- Footer -->
        <tr><td style="padding:20px 0 0;text-align:center;">
          <table role="presentation" cellpadding="0" cellspacing="0" style="margin:0 auto;">
            <tr>
              <td style="padding:0 12px;"><a href="{{baseUrl}}" style="color:#71717a;font-size:12px;text-decoration:none;">Website</a></td>
              <td style="color:#27272a;font-size:12px;">|</td>
              <td style="padding:0 12px;"><a href="{{baseUrl}}/privacy" style="color:#71717a;font-size:12px;text-decoration:none;">Privacy</a></td>
              <td style="color:#27272a;font-size:12px;">|</td>
              <td style="padding:0 12px;"><a href="{{baseUrl}}/terms" style="color:#71717a;font-size:12px;text-decoration:none;">Terms</a></td>
            </tr>
          </table>
          <p style="color:#52525b;font-size:11px;margin:16px 0 0;">&copy; 2026 Scrapalot AI. All rights reserved.</p>
        </td></tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
