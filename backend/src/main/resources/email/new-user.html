<tr>
  <td style="background:linear-gradient(135deg,#2563eb 0%,#3b82f6 100%);padding:48px 40px;text-align:center;">
    <div style="width:64px;height:64px;margin:0 auto 20px;background:rgba(255,255,255,0.15);border-radius:50%;line-height:64px;font-size:28px;">👤</div>
    <h1 style="color:#ffffff;margin:0;font-size:28px;font-weight:800;letter-spacing:-0.5px;">New user signed up</h1>
    <p style="color:rgba(255,255,255,0.8);margin:8px 0 0;font-size:15px;">A new account was just created on Scrapalot AI</p>
  </td>
</tr>
<tr>
  <td style="padding:40px;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
      <tr><td style="background:#09090b;border:1px solid #27272a;padding:20px;">
        <p style="color:#71717a;font-size:12px;margin:0 0 4px;text-transform:uppercase;letter-spacing:0.5px;">Name</p>
        <p style="color:#fafafa;font-size:15px;font-weight:600;margin:0 0 16px;">{{name}}</p>
        <p style="color:#71717a;font-size:12px;margin:0 0 4px;text-transform:uppercase;letter-spacing:0.5px;">Email</p>
        <p style="color:#fafafa;font-size:15px;font-weight:600;margin:0 0 16px;">{{email}}</p>
        <p style="color:#71717a;font-size:12px;margin:0 0 4px;text-transform:uppercase;letter-spacing:0.5px;">Sign-up method</p>
        <p style="color:#fafafa;font-size:15px;font-weight:600;margin:0;">{{method}}</p>
      </td></tr>
    </table>

    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
      <tr><td align="center">
        <a href="{{adminUrl}}" style="display:inline-block;background:#3b82f6;color:#ffffff;padding:16px 48px;text-decoration:none;font-weight:700;font-size:16px;letter-spacing:0.3px;">Open Admin →</a>
      </td></tr>
    </table>
  </td>
</tr>
