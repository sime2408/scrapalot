<tr>
  <td style="background:linear-gradient(135deg,#2563eb 0%,#3b82f6 100%);padding:40px 40px 32px;text-align:center;">
    <div style="width:56px;height:56px;margin:0 auto 16px;background:rgba(255,255,255,0.15);text-align:center;line-height:56px;font-size:24px;">✉️</div>
    <h1 style="color:#ffffff;margin:0;font-size:24px;font-weight:800;letter-spacing:-0.3px;">New Contact Message</h1>
    <p style="color:rgba(255,255,255,0.8);margin:6px 0 0;font-size:14px;">Someone reached out via scrapalot.app/contact</p>
  </td>
</tr>
<tr>
  <td style="padding:36px 40px;">

    <!-- Sender details card -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 24px;">
      <tr><td style="background:#09090b;border:1px solid #3f3f46;padding:20px 24px;">
        <p style="color:#71717a;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;margin:0 0 16px;">Sender Details</p>
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
          <tr><td style="padding:4px 0 12px;">
            <span style="color:#71717a;font-size:12px;">Name</span><br>
            <span style="color:#fafafa;font-size:15px;font-weight:600;">{{firstName}} {{lastName}}</span>
          </td></tr>
          <tr><td style="padding:4px 0 12px;">
            <span style="color:#71717a;font-size:12px;">Email</span><br>
            <a href="mailto:{{senderEmail}}" style="color:#3b82f6;font-size:14px;text-decoration:none;">{{senderEmail}}</a>
          </td></tr>
          {{companyLine}}
        </table>
      </td></tr>
    </table>

    <!-- Message card -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin:0 0 28px;">
      <tr><td style="background:#09090b;border:1px solid #3f3f46;padding:20px 24px;">
        <p style="color:#71717a;font-size:11px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;margin:0 0 12px;">Message</p>
        <p style="color:#a1a1aa;font-size:14px;line-height:1.8;margin:0;white-space:pre-wrap;">{{message}}</p>
      </td></tr>
    </table>

    <!-- Reply CTA -->
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
      <tr><td align="center">
        <a href="mailto:{{senderEmail}}?subject=Re: Your Scrapalot inquiry" style="display:inline-block;background:#3b82f6;color:#ffffff;padding:14px 40px;text-decoration:none;font-weight:700;font-size:15px;">Reply to {{firstName}} →</a>
      </td></tr>
    </table>
  </td>
</tr>
