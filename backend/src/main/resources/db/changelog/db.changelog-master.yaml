# Scrapalot Backend - Liquibase Master Changelog
# Database: PostgreSQL (port 5432)
# Schema: scrapalot
#
# Based on Alembic migrations from scrapalot-chat Python backend
# Maintains schema compatibility for shared database tables
#
# Migration order matches Alembic version numbers:
# - 00001: Initial schema (core tables)
# - 00002: AI/LLM provider configuration
# - 00003: Subscriptions and billing (Python-only, skipped)
# - 00004: Connectors and notes/collaboration
# - 00005: RAG vectors (Python-only, skipped)
# - 00006: Indexes (Python-only, skipped)
# - 00007: Seed data
#
# Spring Boot specific tables will use separate changesets with 900+ prefixes

databaseChangeLog:
  # Schema creation (PostgreSQL only)
  - changeSet:
      id: 000-create-schema
      author: liquibase-auto
      preConditions:
        - onFail: MARK_RAN
        - dbms:
            type: postgresql
      changes:
        - sql:
            sql: CREATE SCHEMA IF NOT EXISTS scrapalot
      rollback:
        - sql:
            sql: DROP SCHEMA IF EXISTS scrapalot CASCADE

  # Core schema migrations (matching Alembic 00001)
  - include:
      file: db/changelog/changes/001-initial-schema-users.yaml
      context: dev,prod

  - include:
      file: db/changelog/changes/002-initial-schema-workspaces.yaml
      context: dev,prod

  - include:
      file: db/changelog/changes/003-initial-schema-collections.yaml
      context: dev,prod

  - include:
      file: db/changelog/changes/004-initial-schema-documents.yaml
      context: dev,prod

  - include:
      file: db/changelog/changes/005-initial-schema-sessions.yaml
      context: dev,prod

  - include:
      file: db/changelog/changes/006-initial-schema-messages.yaml
      context: dev,prod

  - include:
      file: db/changelog/changes/007-initial-schema-settings.yaml
      context: dev,prod

  - include:
      file: db/changelog/changes/008-initial-schema-jobs.yaml
      context: dev,prod

  # AI/LLM Provider configuration (matching Alembic 00002)
  - include:
      file: db/changelog/changes/010-ai-providers.yaml
      context: dev,prod

  # Connectors and notes/collaboration (matching Alembic 00004)
  - include:
      file: db/changelog/changes/020-connectors.yaml
      context: dev,prod

  - include:
      file: db/changelog/changes/021-notes-collaboration.yaml
      context: dev,prod

  # AI/LLM Provider tables (full schema, replaces 010 stub)
  # NOTE: Must run BEFORE seed data because seed data references model_providers table
  - include:
      file: db/changelog/changes/013-ai-providers.yaml
      context: dev,prod

  # Python sync migrations (matching Alembic 00003 - billing/subscriptions)
  # Consolidated migration: users.tour_completed, subscription_plans, user_subscriptions, api_keys
  # NOTE: Must run BEFORE seed data because seed data references tour_completed column
  - include:
      file: db/changelog/changes/040-python-sync.yaml
      context: dev,prod

  # Connector tables (matching Alembic connector models)
  - include:
      file: db/changelog/changes/050-connectors.yaml
      context: dev,prod

  # Bug fixes and enhancements
