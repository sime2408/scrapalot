      context: dev,prod

  # Seed data (matching Alembic 00007)
  # NOTE: Must run AFTER all schema migrations since it references columns from 013, 040, etc.
  - include:
      file: db/changelog/changes/030-seed-data.yaml
      context: dev,prod

  # Drop Python-owned connector tables (no longer needed in Kotlin DB)
  - include:
