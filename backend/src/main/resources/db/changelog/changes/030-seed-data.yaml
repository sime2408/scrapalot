# Migration 030: Seed Data
# Purpose: Pre-seed admin + testuser with workspaces, collections, settings, and model providers
# Context: dev,test — only applied in development/test environments

databaseChangeLog:

  # ============================================================
  # CLEANUP: Remove existing test users with wrong UUIDs
  # Ensures seed data can insert with deterministic UUIDs
  # ============================================================
  - changeSet:
      id: 030-seed-cleanup
      author: scrapalot
      labels: seed,data
      context: dev,test
      preConditions:
        - onFail: MARK_RAN
        - sqlCheck:
            expectedResult: "0"
            sql: "SELECT COUNT(*) FROM scrapalot.users WHERE username = 'admin' AND id = '11111111-1111-1111-1111-111111111111'::uuid"
      comment: "Delete existing admin/testuser if they have wrong UUIDs, so seed can re-insert with fixed UUIDs"
      changes:
        - sql:
            sql: |
              DELETE FROM scrapalot.workspace_users WHERE user_id IN (SELECT id FROM scrapalot.users WHERE username IN ('admin', 'testuser') AND id NOT IN ('11111111-1111-1111-1111-111111111111'::uuid, '22222222-2222-2222-2222-222222222222'::uuid));
              DELETE FROM scrapalot.user_settings WHERE user_id IN (SELECT id FROM scrapalot.users WHERE username IN ('admin', 'testuser') AND id NOT IN ('11111111-1111-1111-1111-111111111111'::uuid, '22222222-2222-2222-2222-222222222222'::uuid));
              DELETE FROM scrapalot.collections WHERE workspace_id IN (SELECT id FROM scrapalot.workspaces WHERE user_id IN (SELECT id FROM scrapalot.users WHERE username IN ('admin', 'testuser') AND id NOT IN ('11111111-1111-1111-1111-111111111111'::uuid, '22222222-2222-2222-2222-222222222222'::uuid)));
              DELETE FROM scrapalot.workspaces WHERE user_id IN (SELECT id FROM scrapalot.users WHERE username IN ('admin', 'testuser') AND id NOT IN ('11111111-1111-1111-1111-111111111111'::uuid, '22222222-2222-2222-2222-222222222222'::uuid));
              DELETE FROM scrapalot.users WHERE username IN ('admin', 'testuser') AND id NOT IN ('11111111-1111-1111-1111-111111111111'::uuid, '22222222-2222-2222-2222-222222222222'::uuid);
      rollback:
        - sql:
            sql: "SELECT 1"

