# Migration 005: Sessions and Session-Document Relationships
# Based on: Alembic 00001_initial_schema.py (sessions, session_documents tables)
# Purpose: Chat sessions and document associations

databaseChangeLog:
  - changeSet:
      id: 005-create-sessions-table
      author: liquibase-auto
      labels: core,sessions
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: scrapalot
                tableName: sessions
      changes:
        - createTable:
            schemaName: scrapalot
            tableName: sessions
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_sessions
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_sessions_user_id
                    references: scrapalot.users(id)
                    deleteCascade: true
              - column:
                  name: collection_id
                  type: UUID
                  constraints:
                    nullable: true
                    foreignKeyName: fk_sessions_collection_id
                    references: scrapalot.collections(id)
                    deleteCascade: true
              - column:
                  name: conversation_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: conversation_summary
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: last_model_used
                  type: VARCHAR(255)
                  constraints:
                    nullable: true

      rollback:
        - dropTable:
            schemaName: scrapalot
            tableName: sessions

  - changeSet:
      id: 005-create-sessions-indexes
      author: liquibase-auto
      labels: core,sessions,indexes
      changes:
        - createIndex:
            schemaName: scrapalot
            tableName: sessions
            indexName: idx_sessions_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            schemaName: scrapalot
            tableName: sessions
            indexName: idx_sessions_collection_id
            columns:
              - column:
                  name: collection_id

      rollback:
        - dropIndex:
            schemaName: scrapalot
            tableName: sessions
            indexName: idx_sessions_user_id
        - dropIndex:
            schemaName: scrapalot
            tableName: sessions
            indexName: idx_sessions_collection_id

  - changeSet:
      id: 005-create-session-documents-table
      author: liquibase-auto
      labels: core,sessions
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: scrapalot
                tableName: session_documents
      changes:
        - createTable:
            schemaName: scrapalot
            tableName: session_documents
            columns:
              - column:
                  name: session_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_session_documents_session_id
                    references: scrapalot.sessions(id)
                    deleteCascade: true
              - column:
                  name: document_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_session_documents_document_id
                    references: scrapalot.documents(id)
                    deleteCascade: true

      rollback:
        - dropTable:
            schemaName: scrapalot
            tableName: session_documents

  - changeSet:
      id: 005-create-session-documents-pk
      author: liquibase-auto
      labels: core,sessions
      changes:
        - addPrimaryKey:
            schemaName: scrapalot
            tableName: session_documents
            columnNames: session_id, document_id
            constraintName: pk_session_documents

      rollback:
        - dropPrimaryKey:
            schemaName: scrapalot
            tableName: session_documents
            constraintName: pk_session_documents
