# Migration 007: Server and User Settings
# Based on: Alembic 00001_initial_schema.py (server_settings, user_settings tables)
# Purpose: System configuration and user preferences

databaseChangeLog:
  - changeSet:
      id: 007-create-server-settings-table
      author: liquibase-auto
      labels: core,settings
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: scrapalot
                tableName: server_settings
      changes:
        - createTable:
            schemaName: scrapalot
            tableName: server_settings
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_server_settings
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: setting_key
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_server_settings_key
              - column:
                  name: setting_value
                  type: JSONB
                  constraints:
                    nullable: true

        - createIndex:
            schemaName: scrapalot
            tableName: server_settings
            indexName: idx_server_settings_key
            columns:
              - column:
                  name: setting_key

      rollback:
        - dropTable:
            schemaName: scrapalot
            tableName: server_settings

  - changeSet:
      id: 007-create-user-settings-table
      author: liquibase-auto
      labels: core,settings
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: scrapalot
                tableName: user_settings
      changes:
        - createTable:
            schemaName: scrapalot
            tableName: user_settings
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_user_settings
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_user_settings_user_id
                    references: scrapalot.users(id)
                    deleteCascade: true
              - column:
                  name: setting_key
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: setting_value
                  type: JSONB
                  constraints:
                    nullable: true

        - createIndex:
            schemaName: scrapalot
            tableName: user_settings
            indexName: idx_user_settings_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            schemaName: scrapalot
            tableName: user_settings
            indexName: idx_user_settings_key
            columns:
              - column:
                  name: setting_key

      rollback:
        - dropTable:
            schemaName: scrapalot
            tableName: user_settings
