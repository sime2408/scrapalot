databaseChangeLog:
  - changeSet:
      id: 090-create-annotations-table
      author: scrapalot
      labels: annotations,knowledge
      comment: "Create annotations table for PDF/EPUB document annotations with color-coded highlights"
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: scrapalot
                tableName: annotations
      changes:
        - createTable:
            schemaName: scrapalot
            tableName: annotations
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_annotations_user_id
                    references: scrapalot.users(id)
                    deleteCascade: true
              - column:
                  name: document_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: collection_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: session_id
                  type: UUID
              - column:
                  name: annotation_type
                  type: SMALLINT
                  defaultValueNumeric: 1
                  constraints:
                    nullable: false
              - column:
                  name: selected_text
                  type: TEXT
              - column:
                  name: comment
                  type: TEXT
              - column:
                  name: color
                  type: VARCHAR(7)
                  defaultValue: "#ffd400"
                  constraints:
                    nullable: false
              - column:
                  name: page_label
                  type: VARCHAR(50)
              - column:
                  name: sort_index
                  type: VARCHAR(50)
              - column:
                  name: position_json
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: viewer_type
                  type: VARCHAR(10)
                  defaultValue: "pdf"
                  constraints:
                    nullable: false
              - column:
                  name: is_pinned
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false

        - createIndex:
            schemaName: scrapalot
            tableName: annotations
            indexName: idx_annotations_user_document
            columns:
              - column:
                  name: user_id
              - column:
                  name: document_id

        - createIndex:
            schemaName: scrapalot
            tableName: annotations
            indexName: idx_annotations_collection
            columns:
              - column:
                  name: collection_id

        - createIndex:
            schemaName: scrapalot
            tableName: annotations
            indexName: idx_annotations_document
            columns:
              - column:
                  name: document_id

      rollback:
        - dropTable:
            schemaName: scrapalot
            tableName: annotations
