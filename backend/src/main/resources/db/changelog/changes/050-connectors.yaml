        - createIndex:
            schemaName: scrapalot
            tableName: connector_sync_destinations
            indexName: idx_connector_sync_destinations_collection_id
            columns:
              - column:
                  name: collection_id
      rollback:
        - dropTable:
            schemaName: scrapalot
            tableName: connector_sync_destinations

  # ============================================
