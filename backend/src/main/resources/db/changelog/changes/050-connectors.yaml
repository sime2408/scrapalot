# Migration 050: Connectors
# External data source connectors (Google Drive, Dropbox, SharePoint, etc.)
# Matches Python Alembic connector models

databaseChangeLog:
  # ============================================
  # CONNECTOR CREDENTIALS TABLE
  # ============================================
  - changeSet:
      id: 050-create-connector-credentials
      author: liquibase-auto
      labels: connectors,credentials
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: scrapalot
                tableName: connector_credentials
      changes:
        - createTable:
            schemaName: scrapalot
            tableName: connector_credentials
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_connector_credentials
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: uq_connector_credentials_name
              - column:
                  name: connector_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: credential_json
                  type: TEXT
              - column:
                  name: access_token
                  type: VARCHAR(1000)
              - column:
                  name: refresh_token
                  type: VARCHAR(1000)
              - column:
                  name: token_expires_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: scope
                  type: VARCHAR(500)
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: last_validated_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: validation_error
                  type: TEXT
              - column:
                  name: metadata
                  type: JSONB
        - createIndex:
            schemaName: scrapalot
            tableName: connector_credentials
            indexName: idx_connector_credentials_connector_type
            columns:
              - column:
                  name: connector_type
      rollback:
        - dropTable:
            schemaName: scrapalot
            tableName: connector_credentials

  # ============================================
  # CONNECTORS TABLE
  # ============================================
  - changeSet:
      id: 050-create-connectors
      author: liquibase-auto
      labels: connectors
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                schemaName: scrapalot
                tableName: connectors
      changes:
        - createTable:
            schemaName: scrapalot
            tableName: connectors
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    primaryKeyName: pk_connectors
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: workspace_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_connectors_workspace_id
                    references: scrapalot.workspaces(id)
                    deleteCascade: true
              - column:
                  name: credential_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_connectors_credential_id
                    references: scrapalot.connector_credentials(id)
                    deleteCascade: true
              - column:
                  name: name
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: connector_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: sync_enabled
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: sync_frequency
                  type: VARCHAR(50)
                  defaultValue: daily
              - column:
                  name: auto_sync
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: source_path
                  type: VARCHAR(500)
              - column:
                  name: file_filters
                  type: JSONB
              - column:
                  name: exclude_patterns
                  type: JSONB
              - column:
                  name: last_sync_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: next_sync_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: sync_status
                  type: VARCHAR(20)
                  defaultValue: idle
                  constraints:
                    nullable: false
              - column:
                  name: sync_error
                  type: TEXT
              - column:
                  name: total_files
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: synced_files
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: failed_files
                  type: INTEGER
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: total_size_bytes
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: config
                  type: JSONB
        - createIndex:
            schemaName: scrapalot
            tableName: connectors
            indexName: idx_connectors_workspace_id
            columns:
              - column:
                  name: workspace_id
        - createIndex:
            schemaName: scrapalot
            tableName: connectors
            indexName: idx_connectors_credential_id
            columns:
              - column:
                  name: credential_id
      rollback:
        - dropTable:
            schemaName: scrapalot
            tableName: connectors

  # ============================================
