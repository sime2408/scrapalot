databaseChangeLog:
  - changeSet:
      id: 093-add-note-document-id
      author: scrapalot
      labels: notes,knowledge
      comment: "Add document_id to notes for linking notes to specific documents"
      changes:
        - addColumn:
            schemaName: scrapalot
            tableName: notes
            columns:
              - column:
                  name: document_id
                  type: VARCHAR(36)
                  constraints:
                    nullable: true

        - createIndex:
            schemaName: scrapalot
            tableName: notes
            indexName: idx_notes_document_id
            columns:
              - column:
                  name: document_id
