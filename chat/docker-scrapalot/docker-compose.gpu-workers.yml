# =============================================================================
# GPU WORKERS COMPOSE OVERRIDE
#
# Overrides the scrapalot-workers service to use a CUDA GPU image
# instead of the standard CPU scrapalot-chat image.
#
# Usage (on dedicated GPU server):
#   docker compose -f docker-compose.yaml -f docker-compose.gpu-workers.yml up scrapalot-workers
#
# Prerequisites:
#   1. Build the GPU image on the GPU server:
#      docker build -f docker-scrapalot/Dockerfile.workers -t scrapalot-workers-cuda:latest .
#   2. Set production Redis/DB host env vars (the GPU server connects remotely)
# =============================================================================

services:
  scrapalot-workers:
    image: scrapalot-workers-cuda:latest
    runtime: nvidia
    environment:
      # GPU configuration
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility

      # Remote broker/backend — GPU server connects to production Redis over network
      # Override these in a .env file or via environment on the GPU server
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/3}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/3}
      - CELERY_ENABLED=true

      # Remote database — override with production host IPs
      - POSTGRES_HOST=${POSTGRES_HOST:-pgvector}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-scrapalot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-scrapalot}
      - POSTGRES_DB=${POSTGRES_DB:-scrapalot}

      # Remote Neo4j
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-scrapalot123}
      - GRAPH_ENABLED=${GRAPH_ENABLED:-true}

      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - UPLOAD_PATH=/app/data/upload
      - LLM_MODELS_DIRECTORY=/app/data/models
      - SCRAPALOT_CACHE_DIR=/app/data/cache
      # LLM API keys are in the database (server_settings.system_agent_config)
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - HF_HOME=/app/data/models/huggingface
      - HUGGINGFACE_HUB_CACHE=/app/data/models/huggingface
      - HF_HUB_DISABLE_SYMLINKS=1
      - HF_HUB_DISABLE_TELEMETRY=1

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          # GPU workers can process faster — less peak RAM needed per slot
          memory: 8G
        reservations_mem:
          memory: 2G
