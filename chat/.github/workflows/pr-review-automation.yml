name: PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    # Trigger on:
    # 1. PR creation/update (auto-review)
    # 2. @claude-review command from authorized users (manual review)
    if: |
      (
        github.event_name == 'pull_request'
      ) ||
      (
        (
          github.event_name == 'issue_comment' ||
          github.event_name == 'pull_request_review_comment'
        ) &&
        contains(github.event.comment.body, '@claude-review') &&
        contains(fromJSON('["sime2408"]'), github.event.comment.user.login)
      )

    # Use self-hosted runner on Hetzner server
    runs-on: self-hosted

    # Use production environment for secrets
    environment: prod

    permissions:
      contents: read # Read-only access
      pull-requests: write # Allow comments on PRs
      issues: write # Allow comments on issues
      actions: read # Read CI results
      id-token: write # Required for OIDC authentication

    steps:
      - name: Install dependencies
        run: |
          # Install unzip if not present (required by bun setup)
          if ! command -v unzip &> /dev/null; then
            echo "Installing unzip..."
            sudo apt-get update -qq
            sudo apt-get install -y unzip
          fi

          # Install jq if not present (required for JSON processing)
          if ! command -v jq &> /dev/null; then
            echo "Installing jq..."
            sudo apt-get update -qq
            sudo apt-get install -y jq
          fi

      - name: Fix Git ownership (self-hosted runner) - BEFORE checkout
        run: |
          # Add safe directory before checkout to prevent ownership issues
          git config --global --add safe.directory "$GITHUB_WORKSPACE" || true
          git config --global --add safe.directory '*' || true

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for better context
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          set-safe-directory: true # Automatically add to safe.directory

      - name: Load review instructions
        id: load-instructions
        run: |
          # Get the PR number from the event
          if [ "${{ github.event_name }}" == "issue_comment" ]; then
            PR_NUMBER="${{ github.event.issue.number }}"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
          fi

          # Read the review template
          INSTRUCTIONS=$(cat .github/pr_review_prompt.md)

          # Use heredoc to preserve multiline content with context prepended
          echo "CUSTOM_INSTRUCTIONS<<EOF" >> $GITHUB_OUTPUT
          echo "# GitHub Context" >> $GITHUB_OUTPUT
          echo "- Repository: ${{ github.repository }}" >> $GITHUB_OUTPUT
          echo "- PR Number: ${PR_NUMBER}" >> $GITHUB_OUTPUT
          echo "- Triggered by: ${{ github.actor }}" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "$INSTRUCTIONS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run Claude Code Review
        id: claude
        uses: anthropics/claude-code-action@beta
        timeout-minutes: 20
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Use Claude Code OAuth token from prod environment
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Custom trigger phrase for review workflow
          trigger_phrase: "@claude-review"

          # Review-specific instructions loaded from the template
          custom_instructions: ${{ steps.load-instructions.outputs.CUSTOM_INSTRUCTIONS }}

          # Allow read-only tools for code review
          # Commented out - using default tools which include Read, Grep, LS, Glob, Bash (read-only commands), WebSearch
          # allowed_tools: "Read(*),Grep(*),LS(*),Glob(*),Bash(git log*),Bash(git diff*),Bash(git status*),Bash(git show*),Bash(cat *),Bash(head *),Bash(tail *),Bash(wc *),Bash(find * -type f),Bash(python pre_commit_lint.py lint),WebSearch(*)"

  unauthorized-message:
    # Post message for unauthorized users
    if: |
      (
        github.event_name == 'issue_comment' ||
        github.event_name == 'pull_request_review_comment'
      ) &&
      contains(github.event.comment.body, '@claude-review') &&
      !contains(fromJSON('["sime2408"]'), github.event.comment.user.login)

    runs-on: self-hosted

    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Post unauthorized message
        uses: actions/github-script@v7
        with:
          script: |
            const comment = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `❌ @${context.actor} - You are not authorized to trigger Claude reviews.\n\nOnly the maintainers can trigger Claude Code reviews. Please ask a maintainer for review.`
            };

            if (context.eventName === 'issue_comment') {
              await github.rest.issues.createComment({
                ...comment,
                issue_number: context.issue.number
              });
            } else if (context.eventName === 'pull_request_review_comment') {
              await github.rest.pulls.createReplyForReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                comment_id: context.payload.comment.id,
                body: comment.body
              });
            }
