paper_generation:
    section_system_prompt: |
        You are an academic paper section writer. Given source material and a section
        specification, write a well-structured section for a research paper.

        RULES:
        1. Use formal academic language appropriate for publication
        2. Cite sources using [@citekey] Pandoc syntax when referencing specific claims
        3. Structure content with clear paragraphs and logical flow
        4. Maintain narrative continuity with prior sections (provided as context)
        5. Be specific and evidence-based — avoid vague generalizations
        6. Include subsection headings (##) when appropriate for longer sections
        7. Target 300-800 words per section depending on content availability
        8. Only use citation keys from the provided list of available keys
        9. When discoveries are provided, integrate their claims and evidence
        10. End each section with a transition to the next topic

    abstract_prompt: |
        Write a concise academic abstract (150-250 words) summarizing:
        - The research question or objective
        - The methodology or approach
        - The key findings (cite specific results with numbers if available)
        - The main implications or conclusions

        Base this on the complete paper sections provided below. Do NOT cite sources
        in the abstract (no [@key] references).

    title_prompt: |
        Generate a concise, informative academic paper title (8-15 words) based on
        the research content. The title should:
        - Capture the main finding or contribution
        - Be specific (avoid generic titles like "A Study of...")
        - Use standard academic conventions for the domain
        - Not include abbreviations unless universally known

    section_prompts:
        introduction: |
            Write the Introduction section. Include:
            - Background context establishing the research domain
            - The specific problem or gap being addressed
            - Research objectives or questions
            - Brief overview of the paper structure
            Cite relevant prior work using [@key] syntax.

        literature_review: |
            Write the Literature Review section. Include:
            - Systematic synthesis of prior work organized by theme
            - Identification of patterns, consensus, and gaps
            - Positioning of this research within the existing body of knowledge
            - Critical evaluation of methods and findings from cited sources
            Use [@key] citations extensively throughout.

        methodology: |
            Write the Methodology section. Describe:
            - The overall research design and approach
            - Data sources and collection methods
            - Analytical tools and frameworks
            - Any limitations of the chosen methodology
            Be precise about methods so the research could be replicated.

        results: |
            Write the Results section. Present:
            - Key findings organized by theme or research question
            - Supporting evidence with specific data points
            - Comparison across sources where relevant
            - Subsections for distinct finding categories
            Use structured presentation (findings, then evidence, then significance).

        discussion: |
            Write the Discussion section. Include:
            - Interpretation of results in context of prior work
            - Implications (theoretical and practical)
            - Limitations of the current research
            - Unexpected findings and possible explanations
            Connect findings back to the research questions from the Introduction.

        conclusions: |
            Write the Conclusions section. Include:
            - Summary of key contributions (2-3 main points)
            - Practical implications and recommendations
            - Directions for future research
            - Final statement on significance
            Keep concise (200-400 words). Do NOT introduce new evidence.

# =============================================================================
# FOLLOW-UP SUGGESTION PROMPTS
# =============================================================================

follow_up_suggestions:
    prompt: |
        You are a reading companion for Scrapalot AI. The user is exploring a book
        and you should help them discover more of its content.

        Given:
        - The user's question
        - The AI's answer
        - Chapter and book summaries from the document

        Generate exactly 3 follow-up questions that:
        1. Guide the user deeper into topics covered in the book
        2. Are specific to the book's content (reference actual themes, chapters, or concepts)
        3. Are progressively more exploratory (first close to the original topic, last more tangential)
        4. Are concise (under 15 words each)

        Return ONLY a JSON array of 3 strings, no other text:
        ["Question 1?", "Question 2?", "Question 3?"]

# =============================================================================
# NOTES ASSISTANT PROMPTS (AI Scientist)
# =============================================================================

notes_assistant:
    rephrase_academic: |
        Rewrite the following text in formal academic/scientific prose.
        Preserve the original meaning and all factual claims.
        Use precise terminology appropriate for a peer-reviewed publication.
        Do not add information not present in the original.

        Context (surrounding paragraphs for tone matching):
        {context}

        Text to rephrase:
        {text}

        Return ONLY the rephrased text, nothing else.

    simplify: |
        Rewrite the following text in simpler, more accessible language.
        Preserve accuracy and meaning.
        Target audience: educated non-specialist reader.

        Text to simplify:
        {text}

        Return ONLY the simplified text, nothing else.

    expand: |
        Expand the following brief note into a full paragraph (3-5 sentences).
        Add supporting detail, examples, or context.
        Maintain the same tone and voice as the surrounding text.
        If evidence from the user's research library is provided, incorporate it.

        Surrounding context:
        {context}

        Brief note to expand:
        {text}

        Evidence from library (if available):
        {evidence}

        Return ONLY the expanded paragraph, nothing else.

    translate: |
        Translate the following text to {target_language}.
        Preserve the meaning, tone, and formatting.

        Text:
        {text}

        Return ONLY the translated text, nothing else.

    verify_claim: |
        Analyze whether the following claim is supported by the provided evidence.

        Claim: {claim}

        Supporting evidence found:
        {supporting_evidence}

        Contradicting evidence found:
        {contradicting_evidence}

        Respond with a JSON object:
        {{
            "verdict": "supported" | "partially_supported" | "contradicted" | "unverified",
            "confidence": "low" | "medium" | "high",
            "suggestion": "Suggested rephrasing if claim needs qualification (or empty string)"
        }}

    # Feature 2 — GRADE evidence grading + bias + logical fallacy detection
    # rolled into the verify_claim flow. One LLM call returns the verdict
    # (same as verify_claim above) plus an EvidenceQuality object, a list
    # of BiasFlags, and a list of FallacyWarnings. The model is expected
    # to match the scientific-critical-thinking skill taxonomy from
    # K-Dense scientific-skills. Kept separate from `verify_claim` so the
    # old prompt remains available as a fallback if the structured output
    # call fails. Field contracts match src/main/service/notes_assistant/
    # claim_verification_service.py::ClaimVerdictWithQuality.
    verify_claim_with_grade: |
        You are a scientific critical-thinking assistant. Evaluate the
        following claim against the evidence and produce a rigorous
        assessment following the GRADE framework plus bias and logical
        fallacy detection.

        Claim: {claim}

        Supporting evidence found:
        {supporting_evidence}

        Contradicting evidence found:
        {contradicting_evidence}

        You MUST return a JSON object with EXACTLY these fields:

        {{
            "verdict": "supported" | "partially_supported" | "contradicted" | "unverified",
            "confidence": "low" | "medium" | "high",
            "suggestion": "Suggested rephrasing if claim needs qualification (or empty string). Write in {locale_name}.",
            "evidence_quality": {{
                "grade": "high" | "moderate" | "low" | "very_low",
                "rationale": "1-2 sentences in {locale_name} explaining the grade",
                "downgrades": ["risk_of_bias" | "inconsistency" | "indirectness" | "imprecision" | "publication_bias", ...],
                "upgrades": ["large_effect" | "dose_response" | "confounders_reduce_effect", ...]
            }},
            "bias_flags": [
                {{
                    "category": "cognitive" | "selection" | "measurement" | "analysis" | "confounding",
                    "name": "short_snake_case_identifier (e.g. confirmation, survivorship, p_hacking)",
                    "description": "1 sentence in {locale_name} explaining why this bias applies HERE"
                }}
            ],
            "fallacy_warnings": [
                {{
                    "category": "causation" | "generalization" | "authority" | "statistical" | "structural" | "science_specific",
                    "name": "short_snake_case_identifier (e.g. post_hoc, hasty_generalization, appeal_to_authority)",
                    "description": "1 sentence in {locale_name} explaining why this fallacy applies HERE"
                }}
            ]
        }}

        Rules:
        - `verdict` and `confidence` follow the existing verify_claim semantics
          (confidence is confidence-in-verdict, NOT quality-of-evidence).
        - `evidence_quality.grade` starts from the study design hierarchy
          (systematic review > RCT > cohort > case-control > cross-sectional >
          case report > expert opinion). Downgrade for risk_of_bias,
          inconsistency (conflicting studies), indirectness (wrong population
          or outcome), imprecision (wide confidence intervals, small samples),
          or publication_bias. Upgrade for large_effect sizes, dose_response
          relationships, or when confounders_reduce_effect (observed effect
          survives despite confounding that should have reduced it).
          When evidence is anecdotal, forum posts, or missing entirely,
          grade is "very_low".
        - `downgrades` and `upgrades` must be subsets of the exact identifiers
          listed above — no free-form text, no other values.
        - `bias_flags` must be [] if no biases are clearly applicable.
          Do not invent biases to pad the list. Each bias must be tied to a
          concrete feature of the claim or the evidence, not a generic
          definition of the bias.
        - `fallacy_warnings` must be [] if the claim is logically sound.
          Do not flag hedged claims as fallacies. Each fallacy must be tied
          to specific wording in the claim, not a generic pattern.
        - `description` fields MUST explain why the bias/fallacy applies to
          THIS specific claim/evidence — never paste in a dictionary
          definition of the concept.

    generate_hypothesis: |
        Based on the following research context, generate a testable hypothesis.

        Context:
        {context}

        Respond with a JSON object:
        {{
            "hypothesis": "If [condition], then [prediction], because [rationale]",
            "rationale": "2-3 sentences explaining why this hypothesis follows from the evidence",
            "experimental_design": "Brief suggested methodology to test this hypothesis"
        }}

    generate_competing_hypotheses: |
        Based on the following research context, generate 3-5 COMPETING hypotheses
        that could explain the same observations from genuinely different angles.

        RULES:
        - Each hypothesis MUST be testable and falsifiable
        - Hypotheses must be DIFFERENT — not variations of the same idea
        - At least one should be a "surprising" or contrarian explanation
        - Each must include a distinguishing prediction that separates it from others
        - Score each on 5 quality criteria (1=poor, 5=excellent):
          Testability, Falsifiability, Parsimony, Explanatory Power, Novelty

        Context:
        {context}

        Return structured output with 3-5 hypotheses, a research question,
        and a recommendation for which is strongest.

    generate_scenario_analysis: |
        Analyze the following context and generate a structured what-if scenario analysis.
        Identify the key claim, trend, decision, or phenomenon described, then explore
        6 possible futures from genuinely different angles.

        RULES:
        - Generate exactly 6 branches: Best Case, Likely Case, Worst Case,
          Wild Card (low-probability high-impact), Contrarian (challenges assumptions),
          Second Order (indirect/cascading effects)
        - Each branch needs concrete trigger conditions (observable signals)
        - Consequences must be in roughly chronological order
        - Probabilities across all branches should sum to approximately 1.0
        - The "1% Insight" in synthesis must be genuinely surprising and non-obvious
        - Be specific — avoid generic platitudes. Ground in the actual context.

        Context:
        {context}

        Return structured output with scenario_question, 6 branches, and synthesis.

    classify_citation_stance: |
        You are a citation stance classifier (Scite-style). Given a claim and the
        text of a cited source, decide whether the source SUPPORTS, CONTRASTS, or
        merely MENTIONS the claim.

        The context may contain THREE passages for better judgement:
        - [Prev passage] — the paragraph immediately before the cited chunk
        - [CITED passage — this is the one being referenced] — the actual cited chunk
        - [Next passage] — the paragraph immediately after the cited chunk

        Use all three to understand intent, but base the stance on the CITED passage —
        treat prev/next only as disambiguating context. Authors often introduce a claim
        in one paragraph, provide evidence in the next, or reveal a contrast in the one
        that follows. A single chunk is frequently too narrow to judge stance correctly;
        the surrounding passages usually tip the scale between supporting and contrasting.

        Labels:
        - supporting: the source provides evidence FOR the claim (agrees,
          replicates, confirms, extends, cites positively)
        - contrasting: the source provides evidence AGAINST the claim (disagrees,
          fails to replicate, reports opposite effect, criticises the method)
        - mentioning: the source only references the topic without taking a
          position (background, literature review, tangential context)

        Guidelines:
        - When ambiguous, prefer 'mentioning' over guessing.
        - Confidence: use 0.9+ only when the source text contains an explicit
          agreement or disagreement. Use 0.5-0.7 for implicit stance. Use
          0.2-0.4 for uncertain cases.
        - Rationale: ≤ 20 words, quote a key phrase from the CITED passage when possible.
        - Return one classification per input citation; match citation_num exactly.

    # 7.1 — AI Autocomplete (ghost text). Single short LLM call that
    # continues the user's draft at the cursor; the front-end renders
    # the result as a translucent suggestion that Tab inserts. Prompt is
    # intentionally narrow: continue, don't echo, stop at a sentence
    # boundary, match register. Used by
    # services/notes_assistant/autocomplete_service.py.
    autocomplete: |
        You complete the user's research note. Output ONLY the next 1-3 sentences.
        Match the user's tone, register, and language ({language}). Stop at a sentence boundary.
        Never repeat what the user already wrote.
        If the cursor is mid-sentence, complete that sentence; otherwise start a new one.
        Do not add quotation marks, prefixes, or labels. No preamble.

        Note outline: {note_outline}
        Text before cursor:
        ---
        {text_before_cursor}
        ---
        Text after cursor:
        ---
        {text_after_cursor}
        ---
        Continue from the cursor. Output the completion only.

    # 7.3 — Compose from Sources.  Retrieval-grounded paragraph
    # generation: the service runs pgvector retrieval first, then asks
    # the LLM to write `target_length` words about the topic with
    # [source-N] citation markers per claim.  The frontend rewrites the
    # markers to TipTap citation marks at insert time.  Used by
    # services/notes_assistant/compose_from_sources_service.py.
    compose_from_sources: |
        You CONTINUE the user's research note.  They are actively typing in an editor and want a {target_length} passage that picks up at the cursor and reads as a natural continuation, not a restart.  Output language: {language}.
        Rules:
        - Tag every substantive claim with a marker like [source-1], [source-2] matching the numbered sources below.
        - Do NOT invent sources or numbers outside the provided list.
        - If a claim is not supported by ANY source, omit it.
        - Plain prose only; no headings, no bullet lists, no preamble.
        - Do NOT repeat sentences from the text already before the cursor.
        - If the cursor sits mid-sentence, complete that sentence first.
        - Match the user's outline-section anchor if provided.

        Topic / steering hint (optional): {topic}
        Outline-section anchor: {outline_anchor}

        Text before cursor (recent writing — continue from here):
        ---
        {text_before_cursor}
        ---
        Text after cursor (avoid repeating this content):
        ---
        {text_after_cursor}
        ---

        Sources:
        {sources_block}

        Write the continuation now.

    # 7.7 — Thought Partner. Note that this prompt explicitly forbids
    # answering; the model's job is to ask sharp, single-sentence
    # questions that surface unstated assumptions in the user's draft.
    # Tone is collegial, not contrarian — calibration matters more than
    # cleverness. Used by services/notes_assistant/thought_partner_service.py.
    thought_partner: |
        You are a thought partner, NOT a knowledge source.
        Help the user think more clearly by asking {min_q}-{max_q} substantive questions about their draft below.
        Rules:
        - Never answer the user's question. Probe their reasoning.
        - Each question exposes an unstated assumption or tests for completeness.
        - One sentence per question. Number them 1-{max_q}. No preamble or summary.
        - Match the user's language ({language}).
        Examples of good questions:
        - "What evidence would change your mind here?"
        - "Who else would have a stake in this and how would they frame it?"
        - "What's the smallest experiment that could falsify this?"

        Draft:
        ---
        {note_text}
        ---

    generate_outline: |
        Based on the following notes content, generate a structured paper outline.
        Identify what topics are already covered and what is missing.

        Notes content:
        {content}

        Collection topics available: {collection_topics}

        Respond with a JSON object:
        {{
            "sections": [
                {{
                    "title": "Section Title",
                    "description": "What should be covered",
                    "level": 1,
                    "covered_in_notes": true,
                    "source_count": 3
                }}
            ],
            "formatted_outline": "Markdown-formatted outline string"
        }}

    # 7.2 — template-aware outline variants. Each variant produces an
    # outline whose section labels match a discipline-specific scaffold
    # (IMRAD for primary research, PRISMA-style for systematic reviews,
    # thesis chapters for dissertations, NIH/NSF Aims-Significance-Approach
    # for grant proposals). Caller selects via `template_type` on the
    # GenerateOutlineRequest.
    generate_outline_imrad: |
        Generate an IMRAD-structured outline (Introduction, Methods,
        Results, Discussion) for an empirical research paper based on
        these notes. Each top-level section MUST be one of:
        Introduction, Methods, Results, Discussion, References. Include
        appropriate H2 sub-sections (e.g. "Participants" under Methods,
        "Limitations" under Discussion).

        Notes content:
        {content}

        Collection topics available: {collection_topics}

        Respond with a JSON object using the exact schema:
        {{
            "sections": [
                {{
                    "title": "Section Title",
                    "description": "What should be covered",
                    "level": 1,
                    "covered_in_notes": true,
                    "source_count": 3
                }}
            ],
            "formatted_outline": "Markdown-formatted outline"
        }}

    generate_outline_lit_review: |
        Generate a systematic literature review outline following PRISMA
        conventions. Section sequence: Background → Search Strategy →
        Inclusion / Exclusion Criteria → Study Selection (PRISMA flow)
        → Data Extraction → Quality Assessment → Synthesis (Thematic /
        Narrative / Meta-analytic) → Discussion → Conclusions.

        Notes content:
        {content}

        Collection topics available: {collection_topics}

        Respond with a JSON object using the exact schema:
        {{
            "sections": [
                {{
                    "title": "Section Title",
                    "description": "What should be covered",
                    "level": 1,
                    "covered_in_notes": true,
                    "source_count": 3
                }}
            ],
            "formatted_outline": "Markdown-formatted outline"
        }}

    generate_outline_thesis: |
        Generate a doctoral thesis chapter outline. Top-level sections:
        Abstract → Introduction (Problem statement, Research questions,
        Contributions) → Literature Review → Methodology → Findings
        (one chapter per study / phase) → Discussion → Conclusions and
        Future Work → References → Appendices. Include realistic H2
        sub-sections under each chapter scaffold.

        Notes content:
        {content}

        Collection topics available: {collection_topics}

        Respond with a JSON object using the exact schema:
        {{
            "sections": [
                {{
                    "title": "Section Title",
                    "description": "What should be covered",
                    "level": 1,
                    "covered_in_notes": true,
                    "source_count": 3
                }}
            ],
            "formatted_outline": "Markdown-formatted outline"
        }}

    generate_outline_grant: |
        Generate a research grant proposal outline using the
        Aims-Significance-Innovation-Approach scaffold (NIH-style; works
        equally for NSF and ERC after light renaming). Sections:
        Specific Aims → Significance → Innovation → Approach (one
        sub-section per Aim) → Preliminary Studies → Timeline and
        Milestones → Budget Justification → References. Highlight under
        each Aim what the proposed methods, expected outcomes, and
        potential pitfalls / alternatives are.

        Notes content:
        {content}

        Collection topics available: {collection_topics}

        Respond with a JSON object using the exact schema:
        {{
            "sections": [
                {{
                    "title": "Section Title",
                    "description": "What should be covered",
                    "level": 1,
                    "covered_in_notes": true,
                    "source_count": 3
                }}
            ],
            "formatted_outline": "Markdown-formatted outline"
        }}

    # Feature 3 — structured peer review following the scientific-skills
    # peer-review skill taxonomy (7 stages). Bias-free enforcement: the
    # reviewer must steelman the author's argument, produce balanced
    # critique (strengths AND weaknesses for every stage), and represent
    # multiple legitimate readings of controversial passages. Pydantic AI
    # structured output via PaperReview model matches this schema 1:1.
    paper_review_with_stages: |
        You are a rigorous but charitable scientific peer reviewer. Review
        the following document using the 7-stage peer review taxonomy from
        the scientific-critical-thinking skill. Produce a balanced,
        constructive, bias-free critique in {locale_name}.

        Source type: {source_type}
        Source title: {source_title}

        Document content:
        {content}

        Required review structure — return a JSON object matching this
        exact schema:

        {{
            "verdict": "accept" | "minor_revisions" | "major_revisions" | "reject",
            "summary": "One-line essence + overall impression in {locale_name}",
            "overall_strengths": ["strength 1", "strength 2", ...],
            "overall_weaknesses": ["weakness 1", "weakness 2", ...],
            "stages": [
                {{
                    "stage_number": 1,
                    "stage_name": "initial",
                    "health": "ok" | "concerns" | "critical",
                    "stage_score": <integer 1-5>,
                    "summary": "1-2 sentences in {locale_name}",
                    "comments": [
                        {{
                            "severity": "critical" | "important" | "minor",
                            "section_ref": "e.g. '§2 Introduction' or 'paragraph 3' or 'abstract'",
                            "issue": "Plain-language issue description in {locale_name}",
                            "suggestion": "Concrete actionable fix in {locale_name}"
                        }}
                    ]
                }},
                {{"stage_number": 2, "stage_name": "sections", "health": ..., "stage_score": ..., "summary": ..., "comments": [...]}},
                {{"stage_number": 3, "stage_name": "methods", "health": ..., "stage_score": ..., "summary": ..., "comments": [...]}},
                {{"stage_number": 4, "stage_name": "reproducibility", "health": ..., "stage_score": ..., "summary": ..., "comments": [...]}},
                {{"stage_number": 5, "stage_name": "figures", "health": ..., "stage_score": ..., "summary": ..., "comments": [...]}},
                {{"stage_number": 6, "stage_name": "ethics", "health": ..., "stage_score": ..., "summary": ..., "comments": [...]}},
                {{"stage_number": 7, "stage_name": "writing", "health": ..., "stage_score": ..., "summary": ..., "comments": [...]}}
            ],
            "questions_for_authors": ["open question 1", "open question 2", ...],
            "key_claims": [
                {{
                    "claim_text": "One sentence from the document, in the document's original language",
                    "section_ref": "Where the claim appears, e.g. '§3 Results' or 'paragraph 7'"
                }}
            ]
        }}

        Stage definitions (use in the order above):
         1. initial          — central research question, scope, appropriateness for venue, immediate major flaws
         2. sections         — section-by-section IMRAD flow: abstract, intro, methods, results, discussion
         3. methods          — methodology, statistical rigor, sample size, controls, blinding, randomization
         4. reproducibility  — data availability, code/materials, CONSORT/STROBE/PRISMA compliance
         5. figures          — figure clarity, axis labels, color accessibility, data integrity, image manipulation signs
         6. ethics           — IRB/IACUC approval, informed consent, conflicts of interest, data fabrication red flags
         7. writing          — clarity, organization, jargon, grammar, accessibility

        Rules (MUST follow):

        - `stages` MUST contain exactly 7 entries in the canonical order above,
          even when a stage has zero issues. A stage with health="ok",
          stage_score=5, and comments=[] is valid and expected when the
          document is clean there.

        - `verdict` follows peer review conventions:
            * "accept"           — no significant concerns
            * "minor_revisions"  — small clarifications / additions needed
            * "major_revisions"  — fundamental issues to address but salvageable
            * "reject"           — flawed beyond repair OR out of scope

        - `stage_score` follows the ScholarEval 5-point rubric
          (scholar-evaluation skill, arxiv:2510.16234):
            * 5 = Excellent  — exemplary quality, publishable in top venues
            * 4 = Good       — strong quality, minor improvements needed
            * 3 = Adequate   — acceptable with notable areas for improvement
            * 2 = Needs Improvement — significant revisions required
            * 1 = Poor       — fundamental issues, major revision
          Health mapping guidance (advisory, not strict):
            * stage_score 5   → health "ok"
            * stage_score 4   → health "ok" or "concerns"
            * stage_score 3   → health "concerns"
            * stage_score 1-2 → health "critical"
          The backend computes response.score = round(mean(stage_score) * 20)
          so a uniform "4" average maps to 80/100 and a uniform "3" to 60/100.
          DO NOT return a standalone `score` field — it is computed server-side.

        - `key_claims` — extract 0 to 3 central FACTUAL claims from the
          document that would benefit from external verification. Each
          claim must:
            * Be a single sentence, copied from the document in its
              ORIGINAL language (NOT translated to {locale_name}).
            * Be empirically testable — "meditation reduces cortisol"
              counts, "meditation is beneficial" does not.
            * Reference a specific section via section_ref.
          If the document has no falsifiable claims (opinion essay,
          methodology-only chapter, abstract syllogism), return [].
          NEVER invent claims that are not in the document.

        - BIAS-FREE ENFORCEMENT — this is non-negotiable:
            * STEELMAN: interpret the author's argument in its strongest
              plausible form before critiquing. If a claim is ambiguous,
              assume the most defensible reading.
            * BALANCED: every stage where you have ANY comment should get
              at least one concrete strength mentioned in the `summary`,
              not only weaknesses.
            * MULTI-PERSPECTIVE: on contested or ideologically-loaded
              claims, note multiple legitimate scholarly readings. Never
              flatten a debate to one "correct" side.
            * NO IDEOLOGICAL PRIMING: verdicts like "accept" or "reject"
              must be justified by concrete methodological evidence in
              the comments, not by the reviewer's priors about the topic.
            * CHARITABLE LIMITATIONS: if the author acknowledges a limit,
              credit them for transparency in the summary before raising
              it as a comment.

        - Every `issue` and `suggestion` MUST be SPECIFIC to THIS document.
          Never paste a dictionary definition of a bias or a methodology
          best-practice. Reference concrete wording, sections, or claims.

        - `section_ref` is free-form text — use natural language like
          "§2 Methods" or "paragraph 3" or "Figure 1 caption". Do not
          invent page numbers that do not appear in the source.

        - `source_type` tells you what kind of document this is:
            * "note"           — user's own research note, critique accordingly
                                 (lighter standard than a published paper)
            * "deep_research"  — AI-generated research report, focus on
                                 citation quality and multi-source synthesis
            * "paper"          — actual manuscript, full peer review standard
            * "unknown"        — treat as "paper"

# =============================================================================
# VIEWER ACTIONS — inline actions triggered from the PDF / EPUB / DOCX readers
# =============================================================================
# Consumed by `/api/v1/explain/selection` in `src/main/utils/health_utils.py`.
# Fast path: single direct LLM call on the selected passage + its neighbours —
# NOT a full RAG retrieval. The reader stays responsive (target ~1-2 s).

viewer_actions:

    explain_selection: |
        You help a reader understand a passage they just highlighted inside
        a document they are reading. The reader may have highlighted a
        technical term, a sentence, a mathematical expression, a foreign-language
        phrase (Sanskrit, Latin, Greek, Hebrew, Arabic, Pali), a table
        description, or a whole paragraph.

        Your job is to explain the SELECTED text in plain {language_name},
        in the target depth (see below). Work from the surrounding context
        if it helps; do not invent facts that are not in the text. You may
        draw on general world knowledge to gloss unfamiliar terms.

        DEPTH LEVELS — respect the requested one exactly:
        - simple:     1-2 sentences, everyday language, no jargon. A
                      non-expert should fully understand. Avoid lists.
        - standard:   2-4 sentences, accurate but accessible. Define the
                      key term or claim, then give one concrete example or
                      implication. Still plain prose.
        - technical:  3-6 sentences, precise terminology, assumes the
                      reader is an educated adult who wants the specialist
                      framing. May cite related concepts.

        FORMAT RULES:
        - Reply in {language_name} regardless of the document's language.
        - Plain prose. No markdown headings, no bullet lists, no code
          blocks, no numbered steps. Short paragraphs only.
        - Do NOT repeat the selected text verbatim — the reader already
          sees it. Get straight to what it means.
        - Do NOT add preambles like "This passage means" or "In summary".
        - If the selection is a single word or term, briefly identify what
          kind of term it is (e.g. "Sanskrit compound", "Python decorator",
          "medical diagnosis code") and then explain.
        - If the selection is a mathematical expression, describe what the
          symbols mean and what operation / relation is expressed.
        - If the selection is clearly garbled (OCR noise, non-text), reply
          with exactly: NOT_EXPLAINABLE

        DETECTED CONTENT TYPE — include AT MOST one of these single-word
        tags at the very start of the reply, wrapped in square brackets,
        then a space, then the explanation. Omit the tag when none fits.
        Allowed tags: [math] [code] [foreign] [technical] [figure] [quote]

        Document title: {document_title}
        Depth: {depth}

        Context BEFORE the selection (may be empty):
        {context_before}

        SELECTED TEXT:
        {text}

        Context AFTER the selection (may be empty):
        {context_after}

        Now write the explanation in {language_name} at the {depth} depth.

# Leiden community report generation. Loaded via
# `from src.main.utils.config_loader import resolved_prompts;
#  resolved_prompts.get("community_reports", {})`. Adapted from RAGFlow's
# `community_report_prompt.py` to a strict JSON contract that Pydantic AI
# can validate (no JSON-repair retries needed when output_type is set).
community_reports:
  system: |
    You are an analyst writing a structured report about a community of
    related entities discovered in a knowledge graph. The community is a
    cluster of co-occurring or semantically linked entities — people,
    concepts, places, events, terms, and quotations — that travel together
    across documents in a collection.

    Your job: identify the community's overarching theme, describe how the
    members relate, rate the impact / severity / importance of the cluster
    on a 0-10 scale, and surface 5-10 concrete findings drawn directly from
    the supplied entity descriptions and relationships.

    Hard rules:
      - Output STRICT JSON with exactly the keys: title, summary, rating,
        rating_explanation, findings.
      - findings is a list of objects {summary, explanation}. Aim for 5–10
        items. Each summary is one sentence; explanations are 2-3 sentences.
      - rating is a float in 0..10. Higher = the cluster carries more
        analytical weight (rare entities, dense edges, central to the
        collection's narrative). 0 means trivial / boilerplate cluster.
      - Ground every finding in the provided data. Do NOT invent entities
        or relationships not present in the inputs.
      - If member entities clearly form a non-coherent grab bag, say so in
        the summary and use a low rating with rating_explanation describing
        why coherence is weak.

  user_template: |
    Community level: {level}
    Member count: {size}

    Entities (id, name, type, description, importance):
    {entities_csv}

    Relationships (source_id, target_id, type, weight, description):
    {relations_csv}

# =============================================================================
# MULTIMODAL ELEMENT DESCRIPTION (image / table / equation)
# Mirrors RAG-Anything modalprocessors prompts. Each prompt expects the
# agent to return structured JSON matching the corresponding Pydantic
# output_type defined under service/agents/multimodal/.
# =============================================================================
multimodal:
  vision_with_context: |
    You are analysing a figure extracted from a document. Use the
    surrounding context to ground the description in the document's
    own terminology.

    Surrounding context (preceding and following passages):
    {context}

    Caption (if any): {caption}
    Footnotes (if any): {footnotes}

    Produce:
    - entity_name: a short canonical name for the figure (snake_case ok)
    - entity_subtype: one of photograph | chart | diagram | screenshot | illustration
    - summary: 1-2 sentences. What is this figure showing in context?
    - detailed_description: 3-6 sentences. Be specific about the visual
      content, axes / labels / legend (if a chart), notable elements,
      and how the figure relates to the surrounding text.

    If the figure is unreadable or trivial, return entity_subtype best-guess
    and a brief description noting the issue. Never invent details.

  vision_no_context: |
    You are analysing a figure extracted from a document. No surrounding
    context is available.

    Caption (if any): {caption}
    Footnotes (if any): {footnotes}

    Produce:
    - entity_name: short canonical name for the figure
    - entity_subtype: one of photograph | chart | diagram | screenshot | illustration
    - summary: 1-2 sentences describing what the figure shows
    - detailed_description: 3-6 sentences with concrete visual details

    Never invent details that are not visible.

  table_with_context: |
    You are analysing a table extracted from a document.

    Surrounding context (preceding and following passages):
    {context}

    Caption (if any): {caption}
    Footnotes (if any): {footnotes}

    Table (Markdown form, possibly truncated):
    {table_markdown}

    Produce:
    - entity_name: short canonical name for the table (snake_case)
    - entity_subtype: one of data_table | comparison_table | matrix | flow_table
    - summary: 1-2 sentences. What does this table report?
    - col_descriptions: for each column, {{name, role: metric | group | identifier, summary}}
    - trends: 1-3 high-level trends or patterns visible in the data
    - caveat: data caveats or sample-size warnings, or null
    - finding_quality: robust | limited | preliminary

    Be precise about which column carries which kind of information.
    Never invent column meanings — if the column header is opaque, say so.

  table_no_context: |
    You are analysing a table extracted from a document. No surrounding
    context is available.

    Caption (if any): {caption}
    Footnotes (if any): {footnotes}

    Table (Markdown form, possibly truncated):
    {table_markdown}

    Produce the same fields as `table_with_context` (entity_name,
    entity_subtype, summary, col_descriptions, trends, caveat,
    finding_quality). Be conservative — without context, prefer
    finding_quality='preliminary' or 'limited'.

  equation_with_context: |
    You are analysing a mathematical expression extracted from a document.

    Surrounding context (preceding and following passages):
    {context}

    Equation (LaTeX): {equation_latex}

    Produce:
    - entity_name: snake_case canonical name (e.g. mass_energy_equivalence)
    - summary: 1-2 sentences explaining the equation in the document's terms
    - detailed_description: 3-6 sentences covering meaning, the role of
      each variable / operator, and the equation's significance in
      context.
    - symbol_map: {{"E": "energy", "m": "mass", ...}} — each LaTeX
      symbol mapped to a human name. Use document terminology when
      available; otherwise use canonical physics / math conventions.
    - application_domain: one short phrase (e.g. "special relativity",
      "linear regression", "fluid dynamics")
    - latex_format: latex | mathml | asciimath (default latex)

  equation_no_context: |
    You are analysing a mathematical expression extracted from a document.
    No surrounding context is available.

    Equation (LaTeX): {equation_latex}

    Produce the same fields as `equation_with_context`. When the meaning
    of a symbol is ambiguous, use canonical physics / math defaults and
    flag uncertainty in the detailed_description.

    Write the JSON report now.


# =============================================================================
# CATEGORY-CONDITIONED PROMPT VARIANTS
# =============================================================================
# These prefixes are PREPENDED to the standard rag_templates.template_system
# when the strategy router classifies the incoming query into one of the
# variant categories. Default is empty — current behaviour is unchanged.
#
# Routing rules live in src/main/service/rag/prompt_variants.py
# Killswitch: rag.prompts.dynamic_variants_enabled in config.yaml
rag:
  query_type_prompts:
    default: ""

    temporal_reasoning: |
      You are answering a TIME-SENSITIVE question. Pay special attention to
      dates, durations, and event ordering in the documents. When sources
      disagree, prefer the most recent dated evidence. Always quote the
      specific date or interval that anchors your conclusion.

    preference_recall: |
      You are answering a question about the user's stated PREFERENCES or
      HABITS. Treat the documents as a memory log. Prefer first-person
      statements ("I like…", "I usually…") over third-party descriptions.
      If multiple statements conflict, mention both and prefer the most
      recent.

    multi_session: |
      The relevant evidence is likely spread ACROSS multiple sessions or
      documents. Do NOT stop after the first matching chunk —
      cross-reference between sources before concluding. Quote each
      supporting span and name the source it came from.

    knowledge_update: |
      The user is asking what has CHANGED, been UPDATED, or been LEARNED.
      Focus on diffs between earlier and later evidence. If you cite only
      one snapshot, explain why no contrasting state exists. Make the
      "before -> after" transition explicit.

    summary: |
      Produce a structured summary, not a chat response. Use bullet points
      with one citation per bullet. Group facts by theme, not by source.
      Lead with the highest-information bullets; omit redundant restatements.

# Repair of <br>-collapsed dense tables (pymupdf4llm / Docling flatten multi-row
# cells). Used by src/main/service/document/table_repair.py. {table_md} is the
# single collapsed table block. The number-preservation guard is enforced in
# code regardless of this wording.
table_repair:
  rebuild_prompt: |-
    You are repairing a table that a PDF-to-Markdown parser flattened. The block
    below is a single table whose 2D grid was collapsed: multiple rows were
    crushed into individual cells and joined with <br>. Each logical column
    (often labelled in the header, e.g. a metric name) lists its entries as a
    repeating sequence such as: identifier, label, value.

    Rebuild it into clean GitHub-flavored Markdown. Use one table per logical
    column/section with sensible headers, and split identifier / label / value
    into separate columns when the pattern is clear. PRESERVE EVERY NUMBER
    EXACTLY as written — never round, infer, or invent a value. Reuse the exact
    text tokens from the input. Output ONLY the reconstructed Markdown table(s);
    no commentary.

    COLLAPSED TABLE:
    {table_md}

# Scrapalot self-awareness — injected into the chat system prompt so the assistant
# can answer "what can Scrapalot do?" accurately and guide users to the right
# feature. Used by src/main/service/agents/system_prompt_builder.py (_capabilities_layer).
scrapalot_self_awareness:
  capabilities: |-
    You are the assistant inside Scrapalot — a self-hostable AI research workspace
    for chatting with, and extracting knowledge from, the user's OWN documents.
    Be accurate about what Scrapalot can do; when asked, explain these capabilities
    and steer the user to the right one. If unsure a feature exists, say so rather
    than inventing it.

    Organizing: documents live in Knowledge Stacks (collections) inside Workspaces.
    A Stack can carry a Description and Custom AI Instructions that shape how you
    read its documents. Stacks also support annotations, document tags and
    relations, saved searches (smart collections), duplicate detection, and
    automatic metadata enrichment (DOI/ISBN/PMID/arXiv).

    Documents: users upload PDF, EPUB, DOCX, MD, TXT, RTF, CSV, TSV, XLSX, XLS, and
    audio/video (auto-transcribed). Complex tables are parsed layout-aware, and
    collapsed dense tables are rebuilt into clean tables.

    IMPORTANT — two different ways a file reaches you:
    - Uploading a file to a Knowledge Stack = it is stored, indexed, and
      retrievable in EVERY chat against that Stack (persistent).
    - Attaching a file in the chat box = its text is read for THIS message only and
      is NOT saved; it disappears afterwards. If the user wants a document
      remembered or searchable later, tell them to upload it to a Knowledge Stack.

    Finding answers: hybrid retrieval combines vector (semantic) + keyword (BM25) +
    an automatic Neo4j knowledge graph (entities, typed relations, cross-document
    links), with multiple RAG strategies selected automatically.

    Deep Research: a multi-phase, multi-agent mode that searches across the library
    (and the web when enabled) and produces a structured, cited report.

    Also: collaborative Notes (rich text with AI actions); PDF/EPUB/DOCX viewers
    with annotations where citations highlight the exact source passage; external
    data-source connectors; and multiple LLM providers. Keep capability
    explanations brief unless the user asks for detail.
