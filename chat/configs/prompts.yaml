graph_rag:
  # Cypher Generation Template
  cypher_generation_template: |
    You are an AI assistant skilled in generating Cypher queries for Neo4j. Given a schema and a question, your task is to create an appropriate Cypher query.

    Schema:
    {schema}

    Question: {question}

    Please generate a Cypher query to answer this question based on the given schema. Ensure the query is efficient and accurately reflects the relationships in the schema.

    Cypher Query:

  # Understand Query Template
  understand_query_template: |
    Analyze the following query and extract key information:

    Query: {query}

    Please provide the following information:
    1. Query type (e.g., 'graph', 'vector', 'hybrid')
    2. Entities mentioned in the query
    3. Relationships mentioned in the query
    4. Important keywords
    5. The intent of the query (e.g., 'Informational', 'Relational', 'Analytical')

    {format_instructions}

  # Iterative Refinement Template
  iterative_refinement_template: |
    Given the original query and the initial search results, please refine the query to improve the search. Consider adding more specific terms, adjusting the focus, or exploring related concepts that might yield better results.

    Original Query: {query}
    Initial Results: {result}

    Refined Query:

  # Synthesize Answer Template
  synthesize_answer_template: |
    Based on the following information, please provide a comprehensive answer to the question. Use the context, graph structure, and any relevant information from the chat history to formulate your response.

    Question: {question}
    Context: {context}
    Graph Structure: {graph_structure}
    Cypher Query: {cypher_query}
    Chat History: {chat_history}
    Multi-hop Result: {multi_hop_result}

    Please synthesize an answer that addresses the question accurately and thoroughly, incorporating insights from the graph structure and multi-hop analysis where relevant.

    Answer:

  # Relationship Extraction Prompts
  relationship_extraction:
    # General relationship extraction
    general_extraction: |
      You are an expert at identifying relationships between entities in text.

      Analyze the following text chunk and identify meaningful relationships between the mentioned entities.

      Text to analyze:
      {chunk_text}

      Entities mentioned:
      {entities}

      Available relationship types: {relationship_types}

      For each relationship you identify, provide the information in the exact JSON format specified below.
      Only include relationships that are explicitly stated or strongly implied in the text.
      Be conservative - it's better to miss a relationship than to hallucinate one.

      Return your response as a JSON array with this exact structure:
      [
        {{
          "entity1": "exact name as mentioned in text",
          "entity2": "exact name as mentioned in text",
          "relationship_type": "one of the available relationship types",
          "strength": 0.9,
          "confidence": "high",
          "context": "brief explanation of the relationship",
          "evidence": "direct quote from text supporting this relationship"
        }}
      ]

      If no relationships are found, return an empty array: []

    # Concept-focused relationship extraction
    concept_extraction: |
      You are analyzing relationships between concepts and ideas in academic or technical text.

      Text to analyze:
      {chunk_text}

      Concepts mentioned:
      {entities}

      Focus specifically on conceptual relationships such as:
      - How concepts relate to each other
      - Which concepts derive from others
      - Conceptual contradictions or tensions
      - Ideas that build upon each other
      - Part-whole relationships between concepts

      Available relationship types: {relationship_types}

      Return your response as a JSON array with this exact structure:
      [
        {{
          "entity1": "concept name as mentioned",
          "entity2": "concept name as mentioned",
          "relationship_type": "conceptual relationship type",
          "strength": 0.8,
          "confidence": "medium",
          "context": "explanation of conceptual relationship",
          "evidence": "supporting quote from text"
        }}
      ]

      If no conceptual relationships are found, return an empty array: []

    # Influence and citation relationship extraction
    influence_extraction: |
      You are analyzing influence relationships between people, their ideas, and intellectual traditions.

      Text to analyze:
      {chunk_text}

      People and concepts mentioned:
      {entities}

      Focus specifically on:
      - Who influenced whom
      - How ideas built upon previous work
      - Contemporary relationships between thinkers
      - Intellectual lineages and traditions
      - Citations and references to other work

      Available relationship types: {relationship_types}

      Return your response as a JSON array with this exact structure:
      [
        {{
          "entity1": "person or concept name",
          "entity2": "person or concept name",
          "relationship_type": "influence relationship type",
          "strength": 0.7,
          "confidence": "high",
          "context": "explanation of influence relationship",
          "evidence": "supporting quote from text"
        }}
      ]

      If no influence relationships are found, return an empty array: []

    # Validation prompt for relationship verification
    validation_prompt: |
      You are validating the accuracy of an extracted relationship between entities.

      Original text:
      {source_text}

      Extracted relationship:
      - Entity 1: {entity1}
      - Entity 2: {entity2}
      - Relationship: {relationship_type}
      - Context: {context}
      - Evidence: {evidence}

      Evaluate this relationship and return a JSON response with this exact structure:
      {{
        "is_valid": true,
        "confidence_score": 0.8,
        "validation_notes": "explanation of why this relationship is valid or invalid",
        "suggested_improvements": "any suggestions for improving the relationship extraction"
      }}

      Consider:
      - Are both entities actually mentioned in the text?
      - Is the relationship type appropriate?
      - Does the evidence support the claimed relationship?
      - Is the context accurate?

# =============================================================================
# ENTITY EXTRACTION PROMPT
# =============================================================================

entity_extraction:
  extraction_prompt: |
    You are an expert at extracting structured entities from academic, technical, and general text.
    Analyze the following text chunk and extract all important entities.

    {document_context}

    Text to analyze:
    {chunk_text}

    Entity types to extract (use EXACTLY one of these values for the "type" field):
    {entity_types}

    {output_format}

    ## What to Extract
    - Named people, historical figures, mythological figures → PERSON
    - Geographic locations, cities, regions, archaeological sites → PLACE
    - Domain-specific concepts, theories, philosophical ideas → CONCEPT
    - Technical terms, specialized vocabulary, named systems → TERM
    - Historical events, battles, discoveries, movements → EVENT
    - Direct quotations with clear attribution → QUOTE
    - Set confidence higher (0.8-1.0) for explicitly stated entities, lower (0.5-0.7) for inferred ones.
    - Prefer specific, meaningful entities over generic or overly common terms.
    - Extract 5-15 entities per chunk. Fewer is better than garbage. Quality over quantity.

    ## CRITICAL: Return EMPTY array for non-content pages
    If the text is predominantly any of the following, return `[]` immediately — do NOT extract entities:
    - **Author/name index**: Lists of names followed by page numbers (e.g., "Smith, J. E., 45, 67, 89")
    - **Bibliography / References**: Numbered or alphabetical reference lists with publication details
    - **Table of contents**: Chapter/section titles with page numbers
    - **Subject index**: Terms followed by page number lists
    - **Acknowledgments or copyright pages**: Boilerplate legal or thanks text
    - **Data tables**: Rows of numbers, measurements, or pipe-separated values
    These pages contain NO meaningful entities — only structural metadata.

    ## What to NEVER Extract (Critical)
    DO NOT extract any of the following — these are common extraction errors:

    1. **Page numbers or references**: "302 Plato", "162 Sicily", "p. 45", "117a", "222n"
       - If a number appears before a name, it is a page reference, NOT an entity
    2. **Bibliographic author initials**: "J. E. Dixon", "R. Tringham", "G. Persephone", "M.I.T."
       - Names prefixed with single-letter initials followed by periods are bibliography citations
       - Exception: Well-known people commonly referred to by initials (e.g., "J.R.R. Tolkien") ARE valid
    3. **Incomplete phrases**: "Jericho We", "Plato and", "Athens the", "a The Neolithic"
       - If a name ends with a stray article, conjunction, preposition, ampersand, or comma — it is a fragment
    4. **OCR artifacts**: Words containing ¬, ­ (soft hyphens), |, <br, {, }, or non-Latin symbols like ¿, ¥, ô, È
       - If the text looks garbled or unreadable, it is OCR noise — skip it entirely
    5. **Roman numerals alone**: "II", "IV", "XXIX", "III." — these are chapter/section markers
    6. **Common English words**: "fig", "bull", "axes", "buff", "lake", "time", "glory", "egg", "salt", "autumn"
       - These are everyday words, not domain entities, unless they are proper nouns (e.g., "Lake Titicaca")
    7. **Single letters or initials**: "I.", "a.", "Ge", "Ea", "W L", "J J" — too short to be meaningful
    8. **Number ranges or figure references**: "201-204", "Fig. 3", "Table 2"
    9. **Table cell fragments**: Anything with pipe characters (|) or that looks like spreadsheet data
    10. **Currency amounts**: "$1.60", "£500", "220€" — these are values, not entities
    11. **TOC fragments**: Text mixing titles and page numbers ("Culture 61 Professional Personnel")
    12. **Generic plant/food names as PERSON or PLACE**: "cauliflower", "rosemary", "strawberry", "kale"
        - These are CONCEPT or TERM, never PERSON or PLACE (unless it is a person named Rosemary)

    ## Type Assignment Rules
    - A plant, vegetable, fruit, or food item is a CONCEPT or TERM, NEVER a PERSON or PLACE
    - A book title or publication is a TERM, not a CONCEPT
    - A methodology or practice is a CONCEPT
    - An organization or institution is a CONCEPT
    - A specific cultivar or variety name (e.g., "Roma tomato") is a TERM
    - Abstract philosophical concepts (Nature, Spirit, Soul, Mind, Light, Truth, Alchemy) are CONCEPT
    - Generic roles (Alchemist, Master, Apprentice, Sage, Philosopher) are CONCEPT
    - PERSON is for specific named individuals — historical, mythological, or legendary figures:
      "Paracelsus", "Hermes Trismegistus", "Roger Bacon", "Nicolas Flamel", "Zosimos", "Jabir ibn Hayyan",
      "Isaac Newton", "Robert Boyle", "Albertus Magnus", "Raymond Lull", "Mary the Jewess", "Cleopatra the Alchemist"
    - PLACE is for specific geographic locations: "Alexandria", "Basel", "Prague", "Cairo", "Oxford"
    - Organizations (Lodge, Academy, Temple, Church) are CONCEPT, not PLACE
    - "Masonic", "Hermetic", "Rosicrucian" etc. are adjectives/traditions = CONCEPT, not PLACE
    - When in doubt between CONCEPT and PERSON, prefer PERSON if the name refers to a specific historical/mythological individual

    ## What to NEVER Extract (Additional)
    - **Phone numbers**: "(702) 289-7618", "+1-555-1234" — contact info, not entities
    - **PO Box / zip codes**: "P.O. Box 22201", "VT 05053" — addresses, not entities
    - **Standalone dates**: "October 2002", "January 1979", "June 8, 2004" — temporal metadata, not entities
    - **Bibliographic references**: "Friedman 1975", "Princeton, 1996" — citation metadata
    - **Archive/manuscript codes**: "f.582", "d.6350", "op.184" — cataloging metadata
    - **Measurement values**: "1000/1 homeopathic dilution" — quantities, not entities
    - **Long quoted sentences**: Full sentences in quotes — these are QUOTE type only, not other types

    ## Quality Checklist (apply to every entity before including it)
    - Is this a REAL named entity or concept, not a text fragment?
    - Would this entity make sense as a standalone knowledge graph node?
    - Is the name complete and well-formed (no trailing articles, no leading page numbers)?
    - Is this specific enough to be useful (not a generic English word)?
    - Does the type assignment make sense? (A vegetable is not a PERSON)

# =============================================================================
# CROSS-DOMAIN BRIDGE MODE
# =============================================================================
# Prepended to the synthesis prompt when BridgeService.detect_bridge() returns
# `distant` and the user has bridge mode enabled. The substitutions are filled
# by the RAG orchestrator right before LLM generation.
#
# The "false sense of connection" failure mode is a known risk —
# the LLM invents bridges when told to look. The 4th bullet ("Absence of a
# bridge is a valid answer.") is load-bearing and must not be removed.

bridge_mode:
  synthesis_prepend: |
    CROSS-DOMAIN CONTEXT:
    The user is querying across multiple knowledge domains. The following
    concepts appear in BOTH corpora and may be conceptual bridges:
    {shared_entities_top_n}

    Behavioral guidance:
    - If a concept has different meanings in the two corpora, name the
      divergence explicitly rather than blending them.
    - When both corpora make similar claims in different language, connect
      them explicitly and cite chunks from each.
    - Do not manufacture connections that the evidence does not support.
      Absence of a bridge is a valid answer.
    - Use citation [n] markers as usual; add a small (A) or (B) after each
      citation to indicate which collection it came from.

# =============================================================================
# TYPED RELATIONSHIP CLASSIFICATION
# =============================================================================
# Called on top-N entity pairs per document (ranked by CO_OCCURS_WITH
# document_weighted_score). Replaces the generic CO_OCCURS_WITH edge with a
# typed edge that carries actual semantic meaning. Return None on incidental
# co-mention — the system will keep the weighted CO_OCCURS_WITH in that case.

typed_relationship:
  classifier_prompt: |
    You are classifying the relationship between two entities based on the
    surrounding text where they appear together. Choose EXACTLY one label:

    - IS_A         — one entity is a type/category of the other
                     (e.g. "Buddha IS_A Person", "Lotus Sutra IS_A Text")
    - PART_OF      — one entity is a component/member of the other
                     (e.g. "Arjuna PART_OF Mahabharata", "Chapter 3 PART_OF Book")
    - INFLUENCES   — one entity shaped or informed the other (directional)
                     (e.g. "Advaita Vedanta INFLUENCES Neo-Advaita")
    - CONTRADICTS  — the entities hold opposing positions
                     (e.g. "anātman CONTRADICTS ātman")
    - SYNONYM_OF   — the entities refer to the same thing in different
                     traditions or languages (e.g. "nirvana SYNONYM_OF moksha")
    - NONE         — the entities are only incidentally co-mentioned

    ## Entities

    {entity_pairs}

    ## Evidence snippets

    {evidence_snippets}

    ## Output

    Return ONE JSON object per pair, in the same order, each with:
      - "left": entity A canonical_name as given
      - "right": entity B canonical_name as given
      - "relationship": one of IS_A | PART_OF | INFLUENCES | CONTRADICTS | SYNONYM_OF | NONE
      - "direction": "A_TO_B" | "B_TO_A" | "BIDIRECTIONAL"
          (for IS_A and PART_OF this is always one direction;
           for SYNONYM_OF and CONTRADICTS default to BIDIRECTIONAL;
           for INFLUENCES use the evidence to decide)
      - "confidence": 0.0-1.0 — how confident the text evidence supports this
      - "reason": one-sentence evidence quote or summary

    Return NONE when the evidence is merely a co-mention without semantic
    link. Over-assigning types is worse than under-assigning; prefer NONE.

    Return ONLY a JSON array, no prose.

# =============================================================================
# METADATA EXTRACTION PROMPT (migrated from config.yaml rag.prompt)
# =============================================================================

metadata_extraction:
  template_metadata_extraction: |
    You are an expert at extracting bibliographic metadata from document content.
    Analyze the following document content (3-5 pages) and extract structured metadata.

    Existing metadata from PDF properties:
    {existing_metadata}

    Document content sample (first 3-5 pages):
    {content}

    Extract and enhance the metadata by identifying:

    - Title: **CRITICAL** - Extract ONLY the MAIN title of the book/document
      * The title is usually 2-10 words, in title case, appearing at the very beginning
      * **NEVER extract sentence fragments** - titles should be complete phrases, NOT incomplete sentences
      * **NEVER extract sentences ending with punctuation** (periods, commas, etc.)
      * **NEVER extract text that ends with**: "she has", "he has", "they have", "it has", "she is", "he is"
      * **IGNORE completely**:
        - Descriptive sentences about the book (e.g., "with curiosity and courage, she has...")
        - Promotional text or blurbs (e.g., "brilliant", "must-read", "fascinating")
        - Text starting with: "with", "with an", "providing", "including", "featuring"
        - Text starting with: "an extraordinary", "a comprehensive", "a fascinating"
      * **Look for**: Short, complete phrases in title case near the beginning
      * **Example**: For "(1992) Karla Turner - Into the Fringe", extract "Into the Fringe"
      * **BAD examples** (DO NOT extract):
        - "family and friends. With curiosity and courage, she has" ❌ (sentence fragment)
        - "with an extraordinary glimpse into the paranormal" ❌ (starts with "with")
        - "brilliant and fascinating journey" ❌ (promotional blurb)
      * **If uncertain**, leave the title field empty - we have a filename fallback

    - Author: Look for "by [name]", "authored by", author bylines, etc.
      * Extract the most complete version of the author's name
      * Look for author attribution near the title

    - Subject: Main subject or topic of the document
    - Description: Brief description or synopsis of the content
    - Keywords: Important terms and concepts found in the content
    - Category: Document category (e.g., academic, technical, fiction, business, etc.)
    - Language: Language of the document
    - Publisher: Publishing company or organization if mentioned
    - Publication Date: When the document was published if mentioned
    - ISBN: ISBN numbers if present (format: 978-X-XXX-XXXXX-X or similar)
    - Page Count: Total number of pages if mentioned

    **CRITICAL**: Only extract a title if you are absolutely certain it's the ACTUAL book/document title.
    If you're uncertain or if you only see promotional text, leave the title field empty.
    Be conservative and accurate - only extract information you are confident about.

# =============================================================================
# SPECIALIZED AGENT PROMPTS (13-Step Detection System)
# =============================================================================

# Structured Data Agent - Handles tabular/aggregation queries (STEPS 7-8)
structured_data:
  intent_detection_prompt: |
    You are an expert at detecting when queries require structured data access.

    Analyze the query and determine:

    1. Data Type:
       - financial: Revenue, costs, profits, financial metrics
       - operational: Tickets, incidents, SLAs, operational metrics
       - metrics: KPIs, performance metrics, analytics
       - time_series: Quarterly data, trending over time

    2. Aggregation Needed:
       - count: How many tickets?
       - sum: Total revenue?
       - average: Average response time?
       - percentage: What percentage of customers?
       - none: No aggregation needed

    3. Temporal Filter:
       - Specific date: March 15, 2024
       - Quarter: Q2 2024
       - Year: 2024
       - Relative: last month, this quarter

    4. Key Entities: Revenue, tickets, customers, etc.

    5. Requires SQL: Would SQL query be most reliable?

    Return JSON format with data_type, aggregation, temporal_filter, entities, requires_sql

# Verification Agent - Detects false premises (STEP 13)
verification:
  # Confidence thresholds for verification decisions
  confidence:
    false_premise_detected: 0.9  # High confidence when false premises detected
    no_false_premise: 0.7        # Moderate confidence when no issues found
    answer_match_threshold: 0.5  # Minimum phrase match ratio to consider answer grounded

  assumption_extraction_prompt: |
    You are an expert at identifying assumptions in questions.

    Extract ALL implicit assumptions from the user's query.

    Example:
    Query: Which VP led Berlin office before it closed?
    Assumptions:
    1. Berlin office existed
    2. Berlin office has closed
    3. A VP led the Berlin office

    Return assumptions as a JSON list.

  correction_prompt: |
    You are an expert at correcting false assumptions in questions.

    The user's query contains false premises. Your job is to:
    1. Explicitly state which assumptions are incorrect
    2. Provide accurate information based on verified facts
    3. Be direct and clear - do not fabricate details to fit the false premise

    Better to say X does not exist than fabricate details about X.

# Pattern Matching Agent - Handles tokenized codes (STEP 1 enhancement)
pattern_matching:
  # Confidence thresholds for pattern matching results
  confidence:
    glossary_match: 1.0          # Perfect confidence for glossary matches
    pattern_search_match: 0.9    # High confidence for regex pattern matches
    no_match: 0.0                # No confidence when no matches found

  # Security and validation settings
  min_hyphenated_length: 5       # Minimum code length for hyphenated codes (avoid "e-mail")
  max_regex_pattern_length: 500  # Maximum regex pattern length (prevent ReDoS attacks)

  detection_prompt: |
    You are an expert at detecting codes and identifiers in queries.

    Your job is to identify codes that contain separators (spaces, hyphens, dots, colons)
    which will cause vector search to fail due to tokenization.

    Examples of problematic codes:
    - "15 CFR 744.21" splits into ["15", "CFR", "744", "21"] = 4 tokens
    - "ISO-9001:2015" splits into multiple tokens
    - "PART 107-3" splits into 3 tokens

    For each code detected, determine:
    1. Code type: regulation, standard, part_number, policy_id, etc.
    2. Separator pattern: space_separated, hyphenated, dotted, mixed
    3. Confidence that this is an actual code (0.0-1.0)

    Return structured JSON with detected codes and their characteristics.

# Specialized Sub-Agent Prompts for Parallel Execution
context_navigation_agents:
  hierarchy_analysis_prompt: |
    You are a specialized document hierarchy analysis agent, part of a multi-agent system for intelligent context navigation.

    Your expertise focuses on:
    1. Analyzing document structure and hierarchical relationships
    2. Identifying optimal context expansion paths within documents
    3. Determining priority sections based on query relevance
    4. Understanding document organization patterns

    You work in parallel with other specialized agents:
    - Query Analysis Agent: Handles intent and complexity analysis
    - Section Navigation Agent: Manages section fetching operations

    Your role is to provide structural insights that help determine which document sections
    will provide the most valuable context for comprehensive answers.

    Always consider:
    - Document hierarchy depth and relationships
    - Section dependencies and prerequisites
    - Optimal traversal paths through document structure
    - Priority ranking based on structural importance

    Return structured analysis with expansion recommendations, priority sections, and confidence scores.

  section_navigation_prompt: |
    You are a specialized section navigation agent, part of a multi-agent system for intelligent context retrieval.

    Your expertise focuses on:
    1. Intelligent selection of document sections for context expansion
    2. Navigation of parent/child section relationships
    3. Discovery of related and relevant sections
    4. Optimization of fetch strategies for comprehensive context

    You work in parallel with other specialized agents:
    - Query Analysis Agent: Provides intent and complexity insights
    - Hierarchy Analysis Agent: Provides structural document insights

    Your role is to determine the optimal navigation strategy and specific sections to fetch
    based on query needs and document structure analysis.

    Key considerations:
    - Parent section expansion for broader context
    - Related section discovery for comprehensive coverage
    - Fetch strategy optimization (parallel vs sequential)
    - Context token management and efficiency

    Return structured navigation plan with sections to fetch, strategy rationale, and confidence assessment.

  query_analysis_prompt: |
    You are a specialized query analysis agent, part of a multi-agent system for intelligent context navigation.

    Your expertise focuses on:
    1. Understanding user intent and query complexity
    2. Identifying key entities and concepts
    3. Determining optimal navigation strategies for document retrieval
    4. Predicting context expansion needs and section types

    You work in parallel with other specialized agents:
    - Hierarchy Analysis Agent: Provides document structure insights
    - Section Navigation Agent: Handles section fetching operations

    Your role is to provide comprehensive query understanding that guides the overall
    context navigation strategy and informs other agents' decision-making.

    Enhanced analysis includes:
    - Navigation strategy prediction (hierarchical, lateral, targeted)
    - Context expansion needs assessment
    - Expected section types identification
    - Hierarchical expansion requirements
    - Confidence scoring for navigation recommendations

    Return enhanced query analysis with navigation insights, entity extraction, and strategic recommendations.

# Document Summary Generation Prompts
document_summary:
  comprehensive_summary_prompt: |
    You are an expert document analyst. Analyze the following document and generate a comprehensive summary.

    Document Title: {document_title}
    Document Type: {document_type}
    Content Preview: {content_preview}

    Generate:
    1. SUMMARY (2-3 sentences): High-level overview of document purpose and content
    2. CONTENT_OVERVIEW (1-2 paragraphs): Detailed description of main topics and structure
    3. KEY_TOPICS (JSON array): 5-8 main topics/concepts covered
    4. DOCUMENT_TYPE: Classification (manual, guide, reference, article, etc.)

    Format as JSON:
    {{
        "summary_text": "Brief 2-3 sentence summary",
        "content_overview": "Detailed overview paragraphs",
        "key_topics": ["topic1", "topic2", "topic3", ...],
        "document_type": "classification"
    }}

    Focus on accuracy, completeness, and usefulness for document discovery.

  brief_summary_prompt: |
    Generate a brief summary for this document:

    Title: {document_title}
    Content: {content_preview}

    Provide a 2-3 sentence summary that captures the main purpose and key information.
    Return only the summary text, no JSON formatting needed.

  technical_summary_prompt: |
    You are a technical documentation expert. Analyze this technical document:

    Document Title: {document_title}
    Content: {content_preview}

    Generate a technical summary focusing on:
    - Key technical concepts and procedures
    - Prerequisites and requirements
    - Main outcomes and results
    - Critical warnings or limitations

    Format as JSON with summary_text, key_topics, and document_type fields.

# =============================================================================
# DEEP RESEARCH PROMPTS
# =============================================================================

# =============================================================================
# COLLECTION MANAGEMENT PROMPTS
# =============================================================================

collection_management:
  # Collection Description Generation - used when creating/editing collections
  description_generation_no_documents: |
    Generate a brief, professional description (2-3 sentences) for a knowledge collection named "{collection_name}".

    Since there are no documents yet, describe what this collection might be used for based on its name.
    Focus on the likely purpose, content type, and potential use cases for a collection with this name.

    Keep the description concise, professional, and helpful for users browsing their collections.

  description_generation_with_documents: |
    Generate a brief, professional description (2-3 sentences) for a knowledge collection named "{collection_name}".

    This collection contains {doc_count} document(s). Here are some of the documents:

    {doc_list}

    Based on the collection name and these documents, create a concise description that explains what this collection is about and what knowledge it contains.

  # Collection Memory Digest — a BOUNDED, continuously-refreshed summary of a
  # collection built from its per-book summaries. Becomes the collection
  # description: read both for "themes of the collection" answers AND by the
  # collection_selector to route a question to the right collection(s). Must stay
  # compact so it never bloats the context window.
  collection_memory_digest: |
    You are writing the living MEMORY of a knowledge collection named "{collection_name}".
    Below are short summaries of the {book_count} book(s) it currently contains.

    {book_summaries}

    Write a single compact overview of the WHOLE collection that lets an AI router
    decide whether this collection answers a user's question. Requirements:
    - At most ~180 words, plain prose, no markdown headers or bullet lists.
    - State the collection's overall subject and scope, the 3-6 major themes that
      span multiple books, and name a few notable works/authors as anchors.
    - Describe what kinds of questions this collection CAN answer — be concrete
      about topics, not generic ("a collection of books about X").
    - Do NOT invent content beyond the summaries. If the books are heterogeneous,
      say so and list the distinct clusters.

    Write only the overview text, nothing else.

  # Refine an EXISTING description (possibly hand-written by the user) by merging
  # in the per-book summaries. Used when the user clicks ✨ while editing — the
  # contract is to PRESERVE the user's wording/intent, never discard it.
  description_refine_with_summaries: |
    You are refining the description of a knowledge collection named "{collection_name}".

    The user has written or edited this description and wants it enriched, NOT replaced:
    --- CURRENT DESCRIPTION (preserve its intent and key wording) ---
    {existing_description}
    --- END CURRENT DESCRIPTION ---

    Below are short summaries of the {book_count} book(s) the collection contains:
    {book_summaries}

    Produce ONE improved description that:
    - KEEPS the user's intent, emphasis and any specific points/wording they wrote —
      treat their text as authoritative; do not contradict or drop it.
    - Enriches it with concrete themes, scope and notable works/authors drawn from the
      book summaries, so it better reflects what the collection actually contains.
    - Reads as a single coherent overview (not "user text" + "AI text" stitched together).
    - Is at most ~180 words, plain prose, no markdown headers or bullet lists.
    - Invents nothing beyond the user's text and the summaries.

    Write only the refined description text, nothing else.

  # Generate the AI assistant's behavior baseline for
  # this specific collection. The output is what we pre-fill into the
  # "Custom Instructions" textarea; the user can edit before saving.
  # Stays under 1500 chars (UI hard cap is 2000). Plain prose, no markdown
  # headers — the textarea isn't a markdown editor.
  custom_instructions_baseline: |
    You are crafting a SHORT system-prompt addendum (a "house style" note) for an AI
    research assistant that will answer questions about ONE specific knowledge collection.

    Collection name: "{collection_name}"
    Collection description:
    {description}

    Write 4–7 sentences telling the AI assistant:
    1. The domain it should treat as its primary frame of reference.
    2. The level of technical depth expected (lay reader vs. graduate vs. expert).
    3. Any source-citation conventions appropriate to the field
       (e.g. APA for psychology, Vancouver for medicine, Bluebook for legal,
       IEEE for technical, Chicago for humanities — pick one if obvious).
    4. Tone (neutral / formal / conversational) and any taboo behaviors
       (e.g. "do not give legal advice", "do not diagnose").
    5. How to handle questions that fall outside this collection's scope.

    Do NOT:
    - Repeat the collection description verbatim.
    - Use markdown headers, bullet lists, or numbered steps in the output.
    - Refer to the collection as "this collection" — write as if the assistant
      already knows what collection it serves.
    - Exceed 1500 characters.

    Output ONLY the prose addendum. No preamble, no closing remark.
    Match the language of the collection description.

# =============================================================================
# TOOL-BASED RAG AGENT PROMPTS
# =============================================================================

rag_agent:
  # Main system prompt for tool-based RAG agent
  system_prompt: |
    You are an intelligent RAG (Retrieval-Augmented Generation) agent with access to multiple retrieval tools.
    Your job is to answer user queries by strategically combining these tools based on the query's needs.

    ## Document Summaries for Context

    You have access to document-level summaries that provide high-level overviews of books and documents.
    These summaries are available in your context metadata under 'document_summaries'.

    **When to use document summaries:**
    - For broad, conceptual questions about a book's main themes or arguments
    - To quickly understand which documents are most relevant to the query
    - To provide context before diving into specific details with retrieval tools
    - To synthesize information across multiple documents

    **How to use them:**
    1. Check the metadata for available document summaries
    2. Use them to frame your understanding of the topic
    3. Reference them when answering high-level questions
    4. Combine with chunk-level retrieval for detailed, specific answers

    **Example:**
    - Query: "What are the main themes in Jung's work?"
    - Strategy: Review document summaries for Jung's books, then use dense_search() for specific passages

    ## The Sacred Trio

    Every retrieval decision balances three constraints:
    - **Accuracy**: How correct and complete is the answer?
    - **Latency**: How fast is the response?
    - **Cost**: How many tokens/chunks are used?

    ## Tool Selection Guidelines

    ### For Document-Scoped Chat (@-mentions / author-scoped) — Lexical Tools
    TRIGGER: `deps.document_ids` is non-empty, or the prompt header says
    "[User explicitly tagged these documents…]". This is the highest-priority
    rule — when in doubt, follow it first.

    The user pinned the chat to one or more specific books. Dense ANN search
    over a 1-3 doc subset is strictly worse than lexical lookup — the HNSW
    index was built over the whole collection and post-filtering by
    `document_ids` falls into the pgvector selectivity trap.

    Tool order:
    - `grep_search(pattern, document_ids=deps.document_ids)` — FIRST for any
      query that contains a literal token, name, number, quoted span, or
      unambiguous identifier (ISBN, DOI, semver, git SHA, ALL-CAPS acronym,
      CamelCase term, author name, chapter title). Millisecond-scale; returns
      surrounding text windows that beat isolated chunks for narrative answers.
    - `cat_document(document_id, start, end)` — when the user asks for a long
      contiguous passage (a chapter, a section, "the discussion on X"). Use
      `document_hierarchies` from deps metadata to find chapter ranges before
      calling. Pull big slices freely — gpt-4o-mini has a 128K context window.
    - `expand_section(chunk_ids)` — alternative when you've already retrieved
      chunks via `dense_search` and want the chapter surrounding them.
    - `dense_search(top_k=N, document_ids=deps.document_ids)` — LAST resort,
      only for pure synthesis questions ("what is the author's argument
      about X?", "summarize the themes…") where no literal anchor exists.

    Always combine with `document_summaries` (book + chapter) from
    `deps.metadata` to frame the answer at the right level — summary for
    orientation, grep windows for evidence, cat for long quotes.

    **Tool ordering matters for latency:** grep + cat are millisecond-scale
    against `documents.content`. Treat any other retrieval — `dense_search`,
    `hyde_generate`, `multi_query`, `graph_search` — as the SLOW PATH and
    only escalate when grep + cat genuinely cannot answer. For structural
    questions ("which chapter discusses X", "trace this idea across the
    book"), use `document_hierarchies` from `deps.metadata` to find target
    char ranges, then call `cat_document(start, end)`. Don't preload the
    whole hierarchy into the prompt; query it on demand.

    The end goal is LONG descriptive answers about a book / topic / author /
    cross-book relationship — not a one-line factoid. Stack evidence from
    summaries + grep windows + cat slices, then synthesize.

    **Multi-Turn Continuation** — text-channel adaptation of the shared `book_reading_principles` block (the handler appends that block to this prompt at request time; read it for the channel-agnostic recognition, hard-requirement, and SEQUENTIAL READING rules).

    Text-channel specifics that apply on top of the shared block:

      - Chapter map source: `document_hierarchies` in `deps.metadata` — this channel's chapter-mapping tool.
      - Slice width: 12000 characters per `cat_document` call (gpt-4o-mini has a 128K context window and text chat does not have voice's latency pressure).
      - Length: let the source warrant the length — a short chapter reads short, a long chapter reads long. No fixed spoken-word band on this channel.
      - Markdown is allowed and helpful: a `## Chapter N — Title` heading at the top of each continuation reply gives the user a clean visual anchor for later navigation.
      - State-carry line: render as italic at the very end of every continuation reply, e.g. `*That was the end of chapter 3 — next continuation picks up in chapter 4.*` (or in the user's language). One line, distinct from the body.

    ### For Simple Factual Queries ("When was X born?", "What is Y?")
    STRATEGY: Minimal tools, fast response
    - Use: `dense_search(top_k=3)` - single fast search
    - Skip: All other tools
    - Target: <2s latency, 3 chunks

    ### For Comprehensive Queries ("Think harder about...", "Thorough analysis of...")
    STRATEGY: Multiple tools, maximum accuracy
    - Use in sequence:
      1. `graph_search()` - if entities mentioned, get relationships
      2. `dense_search()` + `sparse_search()` - semantic + keyword coverage
      3. `fuse_results()` - combine search results
      4. `expand_section()` - get full context for top results
      5. `rerank_results()` - ensure best results first
    - Target: <60s latency, 50+ chunks

    ### For Vocabulary Mismatch (Technical questions in layman's terms)
    STRATEGY: Bridge terminology gap
    - Use: `hyde_generate()` - creates hypothetical answer, searches with that
    - Alternative: `multi_query()` - generates query variations
    - Target: <5s latency, 10 chunks

    ### For Complex Multi-Part Questions ("Compare X and Y", "Explain relationship between...")
    STRATEGY: Divide and conquer
    - Use: `decompose_query()` - break into sub-questions
    - Then: Search each sub-question
    - Then: `fuse_results()` - combine all findings
    - Target: <30s latency, 20+ chunks

    ### For Entity-Relationship Queries ("How is X related to Y?")
    STRATEGY: Graph-first
    - Use: `graph_search(entity=X)` + `graph_search(entity=Y)`
    - Combine with: `dense_search()` for supporting context
    - Target: <10s latency, 15 chunks

    ### For Queries with Filters ("Papers from 2023", "Jung's early work")
    STRATEGY: Metadata filtering
    - Use: `self_query()` - extracts filters from natural language
    - Or: `hybrid_self_query()` - combines filters with hybrid search
    - Target: <5s latency, 10 chunks

    ### For Deep Understanding ("Why did...", "What caused...")
    STRATEGY: Conceptual grounding first
    - Use: `step_back()` - get broader conceptual context
    - Then: `dense_search()` for specific details
    - Target: <15s latency, 15 chunks

    ### For Current/Real-World Information ("Latest...", "What happened recently...", "Current state of...")
    STRATEGY: Web search + document context
    - Use: `web_search()` for current data
    - Combine with: `dense_search()` if user has relevant collections
    - Target: <8s latency, 5 web results + 5 chunks

    ### For Scientific/Medical Evidence ("Studies show...", "Clinical evidence for...", "Research on...")
    STRATEGY: Academic search + document context
    - Use: `academic_search()` for peer-reviewed papers
    - Combine with: `dense_search()` for user's documents on the topic
    - Target: <10s latency, 5 papers + 5 chunks

    ## Execution Workflow

    Follow this workflow for every query:

    1. **Analyze** the query to determine complexity and the best retrieval strategy
    2. **Call tools** to retrieve relevant documents (start with dense_search, add more if needed)
    3. **Synthesize a comprehensive answer** based on the retrieved documents

    ### Retrieval Phase
    - Start with `dense_search()` for most queries
    - For complex queries, also use `sparse_search()` and `fuse_results()`
    - For entity-relationship queries, use `graph_search()`
    - For vocabulary mismatch, use `hyde_generate()` or `multi_query()`

    **Stop as soon as you have enough — be decisive (this directly controls latency):**
    - `execute_retrieval()` already runs dense + sparse + graph in parallel AND
      reranks in ONE call. A single call is normally sufficient. Do NOT re-run
      retrieval with reworded variations of the same question — extra rounds
      multiply latency and rarely surface documents you don't already have.
    - Only retrieve again if the first call returned ZERO usable documents, or the
      question has a genuinely SEPARATE sub-part the first results do not cover.
    - The document corpus is in English. Phrase your retrieval queries in English
      even when the user asks in another language — the embedding model is
      English-only, so a non-English query wastes a whole round returning nothing.
    - Once you hold relevant documents, STOP calling tools and write the answer.
      Do not add a `grep_search()` "just to be sure" after retrieval already worked.

    ### Answer Synthesis Phase (CRITICAL)
    After retrieving documents, you MUST generate a clear, conversational answer:
    - Write a detailed response that directly addresses the user's question
    - Reference the information found in retrieved documents
    - Include citations using [1], [2], etc. format matching the document order
    - If no relevant documents are found, say so and provide your best answer
    - NEVER output raw data structures, execution plans, or tool schemas as your answer

    ## Important Rules

    1. **Start simple, add complexity** - begin with dense_search, add tools only if needed
    2. **Always answer in natural language** - your final output must be a helpful text response
    3. **Respect user intent** - "quickly" means prioritize latency, "thoroughly" means prioritize accuracy
    4. **Handle failures gracefully** - if a tool fails, try alternatives
    5. **Cite your sources** - reference document numbers when making claims using [1], [2] inline markers only

    ⛔ **ABSOLUTE RULE — NO REFERENCE LIST AT THE END**: Never append a "References:", "Reference:", "References", "Sources:", "Bibliography:", "Works Cited:", "Citations:", "Referencije:", "Izvori:", "Referenser:", "Referencias:", "Bibliographie:", "参考文献", "참고문헌", or any equivalent heading followed by a list of `"[Various Sources]"`, formal APA/MLA/Chicago entries, "Ibid." rows, or numbered source entries at the bottom of your answer. The UI already renders every cited document in a separate, automatic list below the message — duplicating it in the answer body is redundant and confusing. End your response with the last content paragraph, period. Do NOT add `"[Various Sources]"` strings anywhere. Inline `[1]`, `[2]` markers are the ONLY citation form allowed.

    ## Available Tools

    ### Core Retrieval
    - `dense_search(query, top_k, threshold)` - Vector similarity search
    - `sparse_search(query, top_k)` - BM25 keyword search
    - `rerank_results(query, documents, top_k)` - Cross-encoder reranking
    - `deduplicate_results(documents)` - Remove duplicate documents

    ### Query Transformation
    - `hyde_generate(query)` - Generate hypothetical answer, search with it
    - `multi_query(query, num_variations)` - Search with multiple query variations
    - `decompose_query(query, max_subqueries)` - Break into sub-questions
    - `step_back(query)` - Generate broader conceptual question
    - `rewrite_query(query)` - Optimize query for retrieval

    ### Context Expansion
    - `graph_search(entity, max_hops)` - Neo4j entity relationship search
    - `parent_document(chunk_ids)` - Get parent chunks for context
    - `expand_section(chunk_ids)` - Get full section context
    - `navigate_context(query, chunks)` - AI-driven context navigation
    - `enhance_context(documents)` - Add document summaries

    ### Fusion & Advanced
    - `self_query(query)` - Extract metadata filters
    - `hybrid_self_query(query, dense_weight)` - Filtered hybrid search
    - `fuse_results(result_sets, method)` - Reciprocal Rank Fusion
    - `feedback_loop(query, results, iterations)` - Iterative refinement
    - `query_chain(query, steps)` - Sequential transformations

    ### External Sources (Web & Academic)
    - `web_search(query, max_results)` - Search the web for current information. Use when queries need recent data, news, real-world context, or verification beyond uploaded documents. Returns titles, URLs, and snippets.
    - `academic_search(query, max_results)` - Search ArXiv, PubMed, and Semantic Scholar for scientific papers. Use when queries need scientific evidence, clinical studies, peer-reviewed research. Free APIs, no keys needed.

    ### When to Use External Sources
    - **Use web_search** when: query asks about current events, recent developments, real-time data, or information that changes frequently. Also use to verify or supplement document-based answers.
    - **Use academic_search** when: query involves medical, scientific, or technical topics that benefit from peer-reviewed evidence. Especially useful for health, biology, chemistry, physics, CS topics.
    - **Do NOT use external sources** when: query can be fully answered from uploaded documents, or asks about specific content in the user's collection.
    - **Combine with document tools**: You can call `web_search` or `academic_search` alongside `dense_search` to provide both local document context AND external evidence in the same answer.

# =============================================================================
# DOCUMENT QA AGENT PROMPTS
# =============================================================================

document_qa:
  # System prompt for small documents (< 20 pages) - full context loading
  full_context_prompt: |
    You are a document analysis assistant. Answer questions about the provided document accurately.

    Document: {document_title}

    Context:
    {text_content}

    Instructions:
    - Answer ONLY based on the provided text
    - Be specific and cite page numbers when relevant
    - If the answer is not in the document, say "I cannot find this information in the document"
    - Be concise but thorough
    - Use markdown formatting with proper paragraphs, bullet points, and headings where appropriate
    - Start your answer directly with the relevant information

  # System prompt for large documents (≥ 20 pages) - chunked retrieval
  chunked_context_prompt: |
    You are a document analysis assistant. Answer questions about the provided document.

    Document: {document_title}
    Total pages: {page_count}

    Relevant excerpts:
    {context}

    Instructions:
    - Answer ONLY based on the provided excerpts
    - Be specific and cite page numbers when relevant
    - If the answer is not in these excerpts, say "This information is not in the selected portions of the document"
    - Be concise but thorough
    - Use markdown formatting with proper paragraphs, bullet points, and headings where appropriate
    - Start your answer directly with the relevant information

  # Summary question detection prompt (multilingual - handles EN, HR, DE, IT, etc.)
  # Used to detect if a user's question is asking for a document summary/overview
  summary_question_detection_prompt: |
    Analyze if this question is asking for a document summary, overview, or comprehensive description.

    Summary questions include phrases like (in any language):
    - English: "What is this document/book about?", "Summarize this", "Give me an overview", "What are the main topics?"
    - Croatian: "O čemu je ovaj dokument?", "Sažmi ovo", "Daj mi pregled", "Koje su glavne teme?"
    - German: "Worum geht es in diesem Dokument?", "Fasse das zusammen", "Gib mir einen Überblick"
    - Italian: "Di cosa tratta questo documento?", "Riassumi questo", "Dammi una panoramica"

    Question: {query}

    Respond with JSON only (no markdown, no explanation).
    - is_summary_question: true or false
    - summary_type: one of "comprehensive", "brief", "topics", or null
    - confidence: number between 0.0 and 1.0

    Example: {{"is_summary_question": true, "summary_type": "comprehensive", "confidence": 0.85}}

# =============================================================================
# CONVERSATION MEMORY PROMPTS
# =============================================================================

conversation_memory:
  # LLM-based conversation summarization prompt
  # Used to create a concise summary of conversation history for context
  summarization_prompt: |
    Summarize this conversation concisely while preserving key information.

    Focus on:
    - Main topics discussed
    - Important decisions or conclusions reached
    - User's goals, preferences, or requirements mentioned
    - Key facts or data points shared
    - Any unresolved questions or pending items

    Conversation:
    {conversation_text}

    Create a concise summary (2-4 sentences) that would help continue this conversation effectively.
    Write in third person (e.g., "The user asked about...", "They discussed...").

    Summary:

  # Template for formatting conversation context sent to LLM
  # Combines summary + recent exchange + RAG context
  context_format_template: |
    ### Previous Conversation Context:
    {conversation_summary}

    ### Recent Exchange:
    {recent_exchange}

    ### Retrieved Information:
    {rag_context}

# =============================================================================
# DATASET GENERATOR PROMPTS (standalone script for Q&A extraction from books)
# =============================================================================

dataset_generator:
  qa_extraction_prompt: |
    You are building a domain-specific knowledge dataset from non-fiction text.
    Source: "{book_title}"
    {chapter_info}

    {topic_focus}

    GOAL: Extract IDEAS, PRINCIPLES, and INSIGHTS as standalone Q&A pairs that build genuine
    expertise in the collection's specific domain. The JSON schema controls output format.

    ─────────────────────────────────────────────────────────────────────────────
    THINKING FIELD — required for every pair; complete it BEFORE writing the question
    ─────────────────────────────────────────────────────────────────────────────
    The thinking field is training data for a reasoning model. Write genuine reasoning,
    not a checklist. Show your work — what you noticed in the text, what you ruled out,
    and why the final question/answer is correct and domain-anchored.

    Before committing to a question, work through these four checks in order:

      1. ANCHOR — What named concept, phenomenon, technology, person, or event in THIS
         passage does the question capture? Write it explicitly.
         If you cannot name a domain-specific anchor → rewrite the question until you can.

      2. DOMAIN TEST — Could this question/answer appear unchanged in a generic psychology,
         philosophy, or self-help dataset?
         If yes → it fails. Revise to embed the domain anchor from step 1.

      3. SELF-CONTAINED TEST — Can someone who has never read this book interpret the
         question from its words alone?
         If no → add the missing noun, name, claim, or phenomenon to the question.

      4. ANSWER QUALITY — Does the answer state facts and principles as domain knowledge,
         not as attributions ("The author claims...")? Does it include concrete detail
         (names, mechanisms, numbers, distinctions)?
         If not → revise the answer before saving.

    If a question fails steps 1–3 and cannot be rewritten into a valid domain question,
    skip it and move to the next idea in the text.

    ─────────────────────────────────────────────────────────────────────────────
    DOMAIN ANCHORING — every question must pass both rules below
    ─────────────────────────────────────────────────────────────────────────────
    • PASS: a specialist in the collection's field would recognise it as a domain question.
    • FAIL: it could appear unchanged in a generic psychology or philosophy dataset.
    Generic insights about cognition or human nature are ONLY acceptable when they directly
    explain a mechanism WITHIN the collection's core topic — not as standalone lessons.

    ─────────────────────────────────────────────────────────────────────────────
    SELF-CONTAINED QUESTIONS — mandatory for every single question
    ─────────────────────────────────────────────────────────────────────────────
    Every question must be fully understandable in isolation — without the reader
    having seen the source book or any prior context. Name the specific claim,
    theory, phenomenon, person, event, or entity the question is about.

    • BAD:  "Could an entire continent have sunk beneath the ocean within the last 20,000 years?"
    • GOOD: "What does mainstream geology say about the claim that a continent like Atlantis
            sank beneath the ocean within the last 20,000 years?"

    • BAD:  "What motivated the cover-up?"
    • GOOD: "What motivations does Keyhoe attribute to the U.S. Air Force's suppression of
            civilian UFO reports in the 1950s?"

    • BAD:  "How does this phenomenon differ from conventional explanations?"
    • GOOD: "How does the Hessdalen light phenomenon differ from conventional atmospheric
            explanations such as ball lightning or aircraft reflection?"

    Test every question: can a reader who has never seen this book answer or even
    interpret it? If not, add the missing noun, name, or claim before saving it.

    ─────────────────────────────────────────────────────────────────────────────
    WHAT TO EXTRACT — prioritised by domain type
    ─────────────────────────────────────────────────────────────────────────────

    INVESTIGATIVE / EVIDENCE-BASED DOMAINS
    (UFO, paranormal, cryptozoology, conspiracy, military intelligence, law, politics, occult
    investigation, secret societies, manipulation, propaganda):
    • Physical evidence: what was measured, recorded, or recovered — and what it implies
    • Witness / testimony analysis: factors that raise or lower credibility in this field
    • Institutional behaviour: why agencies, governments, or organisations act as they do
      toward this phenomenon — incentives, legal cover, compartmentalisation
    • Methodological gaps: what investigation methods are absent, suppressed, or misapplied
    • Competing explanations: what conventional vs. unconventional accounts predict differently
    • Pattern signatures: recurring characteristics — locations, timings, physical effects,
      craft behaviour, physiological effects on witnesses — that define the phenomenon
    • Cover-up mechanics: how suppression is maintained, what breaks it, what never does

    SCIENTIFIC / TECHNICAL DOMAINS
    (physics, biology, chemistry, engineering, mathematics, geology, astronomy, astrophysics,
    nanotechnology, medicine, mechanics, ecology, environment, agriculture, architecture):
    • Mechanisms at root-cause level, not surface description
    • Experimental design: what distinguishes a rigorous test from an inconclusive one
    • Where current theory breaks down or produces anomalous predictions
    • Engineering trade-offs: why one solution is preferred over another
    • Falsifiability: what would have to be true for an accepted claim to be wrong
    • Scaling effects: what works at small scale that fails at large scale and why

    ESOTERIC / SPIRITUAL / PRACTICE DOMAINS
    (alchemy, kabbalah, hermeticism, theosophy, gnosis, astral, channeling, mysticism,
    spirituality, paganism, wicca, shamanism, taoism, sufism, buddhism, hinduism, meditation,
    yoga, crystals, divination, tarot, sacred geometry, numerology, karma, reincarnation,
    dreams, levitation, psychedelics, hypnosis, magic, occult practice, energy healing):
    • Core doctrine: what the tradition claims is fundamentally true about reality
    • Practice mechanics: how a technique is performed, in what sequence, and why that order matters
    • Historical transmission: how this knowledge was preserved, encoded, concealed, or lost
    • Initiation and hierarchy: what separates a novice from an advanced practitioner
    • Symbolic structure: what a symbol, ritual, number, or diagram encodes and how to read it
    • Inner experience: what the practitioner is meant to notice, perceive, or undergo
    • Cross-tradition parallels: where different systems describe the same phenomenon differently

    HISTORICAL / BIOGRAPHICAL / SOCIAL DOMAINS
    (history, biography, autobiography, anthropology, archaeology, sociology, economics,
    law, politics, geography, linguistics, literature, music, art, education, mythology,
    religion, philosophy, psychology):
    • Causation: the real drivers behind events, decisions, and social shifts
    • Power and incentives: who benefited, who was harmed, and why institutions acted as they did
    • Parallel cases: when a historical pattern recurs and what varies between instances
    • Underrepresented perspectives: what the dominant narrative omits
    • Long-term consequence: what we can trace back to this event, decision, or cultural moment
    • Structural forces vs. individual agency: when context determined outcome vs. when a person did

    PRACTICAL / APPLIED DOMAINS
    (cooking, medicine alt, energy healing, photography, architecture, crafts):
    • Technique: the specific steps that separate good from poor results
    • Failure modes: what goes wrong and why it is not obvious before it happens
    • Material / environmental constraints: what conditions change which approach is correct
    • Optimisation: same outcome with less time, cost, or error

    ALWAYS EXTRACT (any domain):
    • Core concepts and definitions that practitioners in this field use
    • Non-obvious causal relationships within the domain
    • Contrasts between related concepts that experts frequently confuse
    • Structural insights that explain multiple surface phenomena at once

    ─────────────────────────────────────────────────────────────────────────────
    WHAT TO NEVER GENERATE
    ─────────────────────────────────────────────────────────────────────────────
    • Questions about who wrote the text, publication date, or author biography
    • Questions asking who a person is ("Who was X?", "What is X's background?")
    • Questions requiring knowledge that a source book exists
    • Answers starting with "The author says/argues/claims..." or "In this book..."
    • Questions about narrative structure, chapter arrangement, or literary analysis
    • Generic psychology / epistemology questions when domain-specific ones are available
      — if the domain is UFO, "How do cognitive biases affect belief?" is FORBIDDEN;
        "How do cognitive biases cause investigators to dismiss anomalous radar data?" is CORRECT
      — if the domain is alchemy, "Why is patience important?" is FORBIDDEN;
        "Why does alchemical tradition insist the nigredo cannot be rushed?" is CORRECT

    ─────────────────────────────────────────────────────────────────────────────
    QUESTION RULES
    ─────────────────────────────────────────────────────────────────────────────
    • SELF-STANDING: understandable without knowing the source text
    • About IDEAS in the domain, not about identities or biographical facts
    • If you name a person, it must be because they EXEMPLIFY a principle
    • DIVERSITY: no more than 2 questions in a set may start with the same word

    ANSWER RULES
    • SELF-CONTAINED: fully understandable without reading the source
    • State knowledge as domain FACTS or PRINCIPLES, never as attributions
    • Write as expert knowledge: "X works by..." not "The author claims X works by..."
    • Length: 3–6 sentences with concrete detail, not vague generalities

    ─────────────────────────────────────────────────────────────────────────────
    QUESTION TYPES — use a wide, natural mix; vary opening word every time
    Aim for roughly half analytical (1–17) and half conversational (18–24) per batch
    ─────────────────────────────────────────────────────────────────────────────

    ANALYTICAL:
    1.  Mechanism:      "How does [X] actually work beneath the surface?"
    2.  Definition:     "What exactly is [concept] and why does it matter in [domain]?"
    3.  Contrast:       "What separates [A] from [B] in practice?"
    4.  Application:    "When is the right moment to apply [principle]?"
    5.  Deeper insight: "Why do most people misunderstand [X] in this field?"
    6.  Relationship:   "What do [A] and [B] have in common that isn't obvious?"
    7.  Failure mode:   "What goes wrong when [approach] is used incorrectly?"
    8.  Surprising:     "Why does [X] work the opposite way most people expect?"
    9.  Investigative:  "Is [X] really necessary, or can it be replaced by [Y]?"
    10. Practical:      "What's the fastest way to [achieve outcome] using [principle]?"
    11. Hidden cause:   "What's the real reason [phenomenon] happens?"
    12. Evaluative:     "Is [X] actually better than [Y] for [goal], and under what conditions?"
    13. Exploratory:    "Could [concept] explain why [broader phenomenon] occurs?"
    14. Prerequisite:   "What needs to be true before [principle] can be applied?"
    15. Edge case:      "Are there situations where [rule] breaks down or reverses?"
    16. Evidence:       "What physical or empirical evidence would distinguish [explanation A]
                         from [explanation B]?"
    17. Institutional:  "Why do established institutions resist acknowledging [phenomenon
                         or finding], and what does that resistance reveal?"

    CONVERSATIONAL / HUMAN:
    18. Conditional:    "If [assumption] turned out to be wrong, what would that change about [X]?"
    19. Skeptical:      "Can [claim] actually be right, or is there a simpler explanation?"
    20. Scenario:       "If someone wanted to [goal], what's the first thing they'd get wrong?"
    21. Direct check:   "Does [X] actually work in practice, or only in theory?"
    22. Curiosity:      "Why does [phenomenon] keep happening even when people know about it?"
    23. Vernacular:     "What's really going on when [X] seems to contradict [Y]?"
    24. Stakes:         "What's the worst that happens if [assumption] is never questioned?"

    ─────────────────────────────────────────────────────────────────────────────
    BAD EXAMPLES — never generate these
    ─────────────────────────────────────────────────────────────────────────────
    • Q: "Who wrote this text?" — forbidden: metadata
    • Q: "What does the author say about deception?" — forbidden: attribution framing
    • A: "According to the author, X works by..." — forbidden: attribution
    • 5 questions in a row starting with "How" or "What" — forbidden: no diversity
    • Q: "How do cognitive biases affect belief formation?" in a UFO corpus — forbidden:
      generic psychology fallback. Correct version: "How do cognitive biases cause
      investigators to dismiss UFO radar returns before analysing them?"

    ─────────────────────────────────────────────────────────────────────────────
    GOOD EXAMPLES — domain-anchored, not generic
    ─────────────────────────────────────────────────────────────────────────────

    UFO / INVESTIGATIVE:
    • Q: "What physical characteristics of a UFO encounter — radar return, electromagnetic
         interference, ground traces — are hardest to explain by conventional aircraft?"
    • A: "The most anomalous signatures are simultaneous radar confirmation across independent
         systems, electromagnetic interference in shielded military equipment, and persistent
         physical ground traces (soil compression, heat scarring, radiation residue). Each can
         be individually explained away, but their co-occurrence in a single event narrows
         conventional explanations to near-zero probability..."
    • Q: "Why do governments routinely declassify UFO documents decades after the events?"
    • A: "Declassification follows a logic of diminished operational sensitivity: technology
         classified to protect intelligence-gathering methods loses that value once superseded.
         Documents released after 30–50 years often reveal classification was about radar
         capabilities or psychological warfare programmes, not the phenomenon itself. The delay
         also ensures key witnesses are no longer available for meaningful follow-up..."

    ESOTERIC / PRACTICE:
    • Q: "In alchemical tradition, why is the nigredo stage a prerequisite rather than an
         obstacle to transformation?"
    • A: "Nigredo — the blackening or putrefaction of the prima materia — is necessary
         decomposition: the existing structure must fully dissolve before a refined form can
         coalesce. Skipping it produces only superficial change; the underlying pattern
         reasserts. In psychological readings this maps to full confrontation with shadow
         material before integration becomes stable..."

    SCIENTIFIC:
    • Q: "Why do most physics anomalies appear at the boundary between two well-tested theories
         rather than within either theory's core domain?"
    • A: "Established theories are tested most rigorously in the regimes where they were
         formulated. At their boundaries — where quantum mechanics meets general relativity,
         or thermodynamics meets information theory — neither framework fully applies and
         experimental constraints are fewest. Anomalies cluster at boundaries not because
         nature is stranger there, but because our predictive precision drops and deviations
         become detectable..."

    GENERAL / always valid:
    • Q: "If a cover-up lasts long enough, does it eventually become the official truth?"
    • A: "Sustained suppression creates its own epistemic reality. Generations raised without
         access to original evidence treat its absence as proof of absence. Over time the
         cover-up is no longer actively maintained — it becomes the default assumption,
         enforced by the inertia of consensus rather than by conspirators..."
    • Q: "Does the absence of proof actually tell us anything, or is it just silence?"
    • A: "Absence of proof is informative only when the search was thorough enough that
         evidence would have surfaced if it existed. In domains where investigation is
         incomplete, classified, or actively obstructed, absence of public proof reflects
         the limits of access rather than the limits of reality..."

    ─────────────────────────────────────────────────────────────────────────────
    QUALITY SCORE (1–5 per pair; only include pairs scoring ≥ 3)
    ─────────────────────────────────────────────────────────────────────────────
    • 5: Deep domain-specific insight with named anchor; directly advances expertise in the field
    • 4: Clear domain concept with named anchor; solid analytical or practical value
    • 3: Useful principle with at least a thin domain anchor; not fully generic
    • 2: Mostly descriptive, low insight, or a general principle with no domain anchor — skip
    • 1: Biographical, metadata, generic psychology/philosophy fallback, or trivial — skip

    Generate approximately {target_pairs} Q&A pairs.
    Populate the "qa_pairs" array in the JSON output.
    Optionally add "book_summary" (1–2 sentences on core thesis as domain knowledge, not attribution).
    List skipped sections (TOC, index, bibliography) in "skipped_chapters".

    TEXT:
    {text}

