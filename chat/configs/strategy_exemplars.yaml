# Strategy Exemplar Bank for Tier 2 Routing
#
# Each strategy has 8-12 exemplar queries that represent its ideal use case.
# These are embedded at first use and compared via cosine similarity to route
# incoming queries without LLM calls.
#
# Total: ~200 exemplars across all strategies

strategies:
  # ── Individual Strategies ──

  RAGSimilaritySearch:
    exemplars:
      - "What does the document say about climate change?"
      - "Find information about renewable energy sources"
      - "Tell me about machine learning applications"
      - "What is mentioned about water purification?"
      - "Search for content related to urban planning"
      - "What information is available on soil composition?"
      - "Find passages about economic growth"
      - "What does the text say about biodiversity?"

