# Logging Configuration
# Logs are output to stdout/stderr only - captured by Docker and accessible via docker.sock
# Service logs are retrieved via Docker API (see docker_log_service.py)

[loggers]
keys=root,uicheckapp,llm_manager,llm_factory,llama_cpp,alembic,alembic_runtime,alembic_script,model_service,db_operations,redis_operations,langchain_operations,rag_operations,api_operations,auth_operations,filelock,embedding_operations,embedding_resolver,gguf_embeddings,uvicorn_error,websockets,health_utils,websocket_manager,chunking_operations

[handlers]
keys=consoleHandler,detailedConsoleHandler,operationHandler,timedRotatingFileHandler

[formatters]
keys=colorFormatter,detailedColorFormatter,operationColorFormatter,plainFormatter

[filters]
keys=serviceLogsFilter

[logger_root]
level=DEBUG
handlers=operationHandler,timedRotatingFileHandler

[logger_uicheckapp]
level=DEBUG
handlers=operationHandler,timedRotatingFileHandler
qualname=uicheckapp
propagate=0

[logger_llm_manager]
level=INFO
handlers=operationHandler,timedRotatingFileHandler
qualname=src.main.service.llm.llm_manager
propagate=0

[logger_llm_factory]
level=INFO
handlers=operationHandler,timedRotatingFileHandler
qualname=src.main.service.llm.llm_factory
propagate=0

[logger_llama_cpp]
level=INFO
handlers=operationHandler,timedRotatingFileHandler
qualname=llama_cpp
propagate=0

[logger_alembic]
level=INFO
handlers=operationHandler,timedRotatingFileHandler
qualname=alembic
propagate=0

[logger_alembic_runtime]
level=INFO
handlers=operationHandler,timedRotatingFileHandler
qualname=alembic.runtime
propagate=0

[logger_alembic_script]
level=INFO
handlers=operationHandler,timedRotatingFileHandler
