[logger_langchain_operations]
level=DEBUG
handlers=operationHandler,timedRotatingFileHandler
qualname=src.main.service.langchain
propagate=0

[logger_rag_operations]
level=DEBUG
handlers=operationHandler,timedRotatingFileHandler
