# Chunking modules emit per-chapter / per-line debug noise (multi-paragraph
# book passages) under root=DEBUG. INFO drops the spam but keeps the
# "X chunks, Y chapters detected" summary line.
[logger_chunking_operations]
level=INFO
handlers=operationHandler,timedRotatingFileHandler
qualname=src.main.service.rag.chunking
propagate=0

# Note: UTF8StreamHandler includes built-in protection against closed streams
# and colorama wrapping issues. The handler checks stream.closed before writing
# and catches ValueError/OSError/AttributeError from closed or wrapped streams.

[handler_consoleHandler]
class=src.main.utils.core.logger.UTF8StreamHandler
level=DEBUG
formatter=colorFormatter
args=(sys.stdout,)

[handler_detailedConsoleHandler]
class=src.main.utils.core.logger.UTF8StreamHandler
level=DEBUG
formatter=detailedColorFormatter
args=(sys.stdout,)

[handler_operationHandler]
class=src.main.utils.core.logger.UTF8StreamHandler
level=DEBUG
formatter=operationColorFormatter
args=(sys.stdout,)
filters=serviceLogsFilter

[handler_timedRotatingFileHandler]
class=src.main.utils.core.logger.UTF8TimedRotatingFileHandler
level=DEBUG
formatter=plainFormatter
args=('data/logs/scrapalot.log', 'midnight', 1, 1)

[formatter_colorFormatter]
class=src.main.utils.core.logger.ColorFormatter
format=%(asctime)s %(levelname_icon)s[%(levelname)-7s] %(name)s | %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_detailedColorFormatter]
class=src.main.utils.core.logger.ColorFormatter
format=%(asctime)s %(levelname_icon)s[%(levelname)-7s] %(name)s | %(message)s   call_trace=%(pathname)s L%(lineno)-4d
datefmt=%Y-%m-%d %H:%M:%S

[formatter_operationColorFormatter]
class=src.main.utils.core.logger.ColorFormatter
format=%(asctime)s %(levelname_icon)s[%(levelname)-7s] %(name)s | %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_plainFormatter]
format=%(asctime)s [%(levelname)-7s] %(name)-35s | %(message)s
datefmt=%Y-%m-%d %H:%M:%S
