[tool:pytest]
# Integration Test Configuration for Scrapalot-Chat

# Test discovery
testpaths = integration service db
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for test categorization
markers =
    integration: Integration tests requiring real Docker services
    slow: Tests that take longer to run (>30 seconds)
    gpu: Tests requiring GPU resources
    rag: RAG strategy and orchestrator tests
    accuracy: Answer quality and accuracy tests
    latency: Performance and latency tests
    graph: Graph service integration tests (Neo4j)
    document: Document processing integration tests
    neo4j: Tests requiring Neo4j database connection
    redis: Tests requiring Redis cache connection
    postgres: Tests requiring PostgreSQL database connection
    deep_research: Deep research system tests
    chat: Chat controller tests
    agentic: Agentic RAG routing tests

# Output and logging configuration
addopts =
    -v
    --tb=short
    --strict-markers
    --strict-config
    --color=yes
    --durations=10
    --maxfail=3
    --disable-warnings
    --log-cli-level=INFO
    --log-cli-format="%(asctime)s [%(levelname)8s] %(name)s: %(message)s"
    --log-cli-date-format="%Y-%m-%d %H:%M:%S"

# Timeout settings (for integration tests with real services)
timeout = 600
timeout_method = thread

# Async settings for integration tests
asyncio_mode = auto

# Minimum Python version
minversion = 3.8

# Test filtering examples:
# pytest -m "integration and not slow"  # Run integration tests but skip slow ones
# pytest -m "graph"                     # Run only graph-related tests
# pytest -m "neo4j and not performance" # Run Neo4j tests but skip performance tests
# pytest -k "test_real"                 # Run tests with "test_real" in the name
