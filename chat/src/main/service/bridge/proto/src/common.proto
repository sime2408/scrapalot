syntax = "proto3";

// Scrapalot Bridge API - Common Types
// Version: 1.0.0
// Last Updated: 2026-01-31
//
// Shared message types used across all Scrapalot gRPC services.
// Both Python (scrapalot-chat) and Kotlin (scrapalot-backend) must use
// matching versions of these proto files.

package scrapalot.common;

option java_multiple_files = true;
option java_package = "com.scrapalot.backend.grpc.common";
option java_outer_classname = "CommonProto";

// Common timestamp message
message Timestamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

// Common UUID message
message UUID {
  string value = 1;
}

// Common pagination request
message PageRequest {
  int32 page = 1;
  int32 size = 2;
  string sort_by = 3;
  string sort_direction = 4; // "asc" or "desc"
}

// Common pagination response
message PageResponse {
  int32 total_pages = 1;
  int64 total_elements = 2;
  int32 current_page = 3;
  int32 page_size = 4;
  bool has_next = 5;
  bool has_previous = 6;
}

// Common empty message
message Empty {}

// Common status response
message StatusResponse {
  bool success = 1;
  string message = 2;
}

// Common error details
message ErrorDetail {
  string field = 1;
  string message = 2;
  string code = 3;
}

// Common error response
message ErrorResponse {
  string error = 1;
  string message = 2;
  int32 status_code = 3;
  repeated ErrorDetail details = 4;
  Timestamp timestamp = 5;
}
