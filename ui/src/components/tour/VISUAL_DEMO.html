<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrapalot Tour - Visual Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: 'hsl(217.2 91.2% 59.8%)',
            background: 'hsl(240 10% 3.9%)',
            foreground: 'hsl(0 0% 98%)',
            border: 'hsl(240 5.9% 90%)',
            accent: 'hsl(240 4.8% 95.9%)',
          }
        }
      }
    }
  </script>
  <style>
    [data-accent="blue"] { --primary: 217.2 91.2% 59.8%; }
    [data-accent="green"] { --primary: 142.1 76.2% 36.3%; }
    [data-accent="violet"] { --primary: 262.1 83.3% 57.8%; }
    [data-accent="red"] { --primary: 0 72.2% 50.6%; }
    [data-accent="orange"] { --primary: 24.6 95% 53.1%; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    .spotlight {
      position: fixed;
      pointer-events: none;
      transition: all 0.3s ease-out;
      border: 2px solid hsl(var(--primary));
      box-shadow: 0 0 0 4px rgba(0, 0, 0, 0.1);
      z-index: 9999;
    }

    .spotlight-corner {
      position: absolute;
      width: 12px;
      height: 12px;
      background: hsl(var(--primary));
    }

    .tooltip {
      position: fixed;
      width: 400px;
      max-width: calc(100vw - 32px);
      z-index: 10000;
      transition: all 0.3s ease-out;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 9998;
      transition: opacity 0.3s ease-out;
    }

    .progress-dot {
      width: 8px;
      height: 8px;
      border-radius: 9999px;
      transition: all 0.2s;
    }

    .progress-dot.active {
      background: hsl(var(--primary));
      transform: scale(1.25);
    }

    .progress-dot.completed {
      background: hsl(var(--primary) / 0.5);
    }

    .progress-dot.upcoming {
      background: hsl(240 5.9% 90%);
    }
  </style>
</head>
<body class="bg-zinc-900 text-white" data-accent="blue">

  <!-- Mock Dashboard -->
  <div class="min-h-screen">
    <!-- Header -->
    <header class="border-b border-zinc-700 px-6 py-4 flex items-center justify-between">
      <h1 class="text-2xl font-bold">Scrapalot Dashboard</h1>
      <div class="flex items-center gap-4">
        <button data-tour="settings" class="p-2 hover:bg-zinc-800 transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
          </svg>
        </button>
        <button onclick="demoTour()" class="px-4 py-2 border border-zinc-700 hover:bg-zinc-800 text-sm">
          Restart Tour
        </button>
      </div>
    </header>

    <div class="flex">
      <!-- Sidebar -->
      <aside class="w-64 border-r border-zinc-700 p-4">
        <h2 class="text-sm font-semibold text-zinc-400 uppercase mb-4">Knowledge Base</h2>
        <button data-tour="upload" class="w-full flex items-center gap-3 p-3 border border-zinc-700 hover:bg-zinc-800 transition-colors mb-4">
          <svg class="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
          </svg>
          <span class="text-sm font-medium">Upload Documents</span>
        </button>
      </aside>

      <!-- Main -->
      <main class="flex-1 flex flex-col">
        <div class="flex-1 p-6">
          <div class="max-w-4xl mx-auto">
            <div class="flex items-start gap-3 bg-zinc-800/50 p-4">
              <div class="w-8 h-8 rounded-full bg-blue-500/10 flex items-center justify-center text-xs font-semibold">
                AI
              </div>
              <div class="flex-1">
                <p class="text-sm">Hello! I'm your AI research assistant. How can I help you today?</p>
              </div>
            </div>
          </div>
        </div>

        <!-- Toolbar -->
        <div class="border-t border-zinc-700 p-4">
          <div class="max-w-4xl mx-auto space-y-3">
            <div class="flex items-center gap-2">
              <button data-tour="research" class="flex items-center gap-2 px-3 py-1.5 border border-blue-500/30 bg-blue-500/10 hover:bg-blue-500/20 transition-colors">
                <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
                <span class="text-sm font-medium text-blue-500">Deep Research Mode</span>
              </button>
            </div>

            <div data-tour="input" class="relative">
              <input
                type="text"
                placeholder="Ask a question or describe your research needs..."
                class="w-full px-4 py-3 bg-zinc-800 border border-zinc-700 focus:border-blue-500 focus:outline-none text-sm"
              />
              <button class="absolute right-2 top-1/2 -translate-y-1/2 p-2 bg-blue-600 hover:bg-blue-700 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                </svg>
              </button>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <!-- Tour Overlay (will be dynamically added) -->
  <div id="tour-container"></div>

  <script>
    const steps = [
      {
        title: 'Welcome to Scrapalot',
        description: 'Your AI-powered research assistant. Let\'s take a quick tour to get you started.',
        target: 'body',
        placement: 'center'
      },
      {
        title: 'Chat Interface',
        description: 'Ask questions, get AI-powered answers, and engage in deep research conversations.',
        target: '[data-tour="input"]',
        placement: 'top'
      },
      {
        title: 'Deep Research Mode',
        description: 'Enable deep research for comprehensive, multi-source analysis with citations.',
        target: '[data-tour="research"]',
        placement: 'bottom'
      },
      {
        title: 'Knowledge Base',
        description: 'Upload documents, PDFs, and research papers to build your knowledge library.',
        target: '[data-tour="upload"]',
        placement: 'right'
      },
      {
        title: 'Customize Your Experience',
        description: 'Access settings to configure AI models, themes, and preferences.',
        target: '[data-tour="settings"]',
        placement: 'left'
      },
      {
        title: 'You\'re All Set',
        description: 'Start exploring Scrapalot. You can revisit this tour anytime from settings.',
        target: 'body',
        placement: 'center'
      }
    ];

    let currentStep = 0;

    function demoTour() {
      currentStep = 0;
      showStep(0);
    }

    function showStep(index) {
      if (index < 0 || index >= steps.length) return;

      currentStep = index;
      const step = steps[index];
      const target = document.querySelector(step.target);

      // Create backdrop
      let backdrop = document.querySelector('.backdrop');
      if (!backdrop) {
        backdrop = document.createElement('div');
        backdrop.className = 'backdrop';
        document.body.appendChild(backdrop);
      }

      // Create or update spotlight
      let spotlight = document.querySelector('.spotlight');
      if (!spotlight) {
        spotlight = document.createElement('div');
        spotlight.className = 'spotlight';
        spotlight.innerHTML = `
          <div class="spotlight-corner" style="top: -1px; left: -1px;"></div>
          <div class="spotlight-corner" style="top: -1px; right: -1px;"></div>
          <div class="spotlight-corner" style="bottom: -1px; left: -1px;"></div>
          <div class="spotlight-corner" style="bottom: -1px; right: -1px;"></div>
        `;
        document.body.appendChild(spotlight);
      }

      if (target && step.placement !== 'center') {
        const rect = target.getBoundingClientRect();
        const padding = 16;
        spotlight.style.top = (rect.top - padding + window.scrollY) + 'px';
        spotlight.style.left = (rect.left - padding + window.scrollX) + 'px';
        spotlight.style.width = (rect.width + padding * 2) + 'px';
        spotlight.style.height = (rect.height + padding * 2) + 'px';
        spotlight.style.opacity = '1';
      } else {
        spotlight.style.opacity = '0';
      }

      // Create or update tooltip
      let tooltip = document.querySelector('.tooltip');
      if (!tooltip) {
        tooltip = document.createElement('div');
        tooltip.className = 'tooltip';
        document.body.appendChild(tooltip);
      }

      tooltip.innerHTML = `
        <div class="bg-zinc-900 border-2 border-blue-600">
          <!-- Header -->
          <div class="flex items-center justify-between p-4 border-b border-zinc-700">
            <div class="flex items-center gap-2">
              <div class="p-1.5 bg-blue-500/10">
                <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
              </div>
              <h3 class="text-lg font-semibold">${step.title}</h3>
            </div>
            <button onclick="closeTour()" class="p-1 hover:bg-zinc-800 transition-colors">
              <svg class="w-5 h-5 text-zinc-400 hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
              </svg>
            </button>
          </div>

          <!-- Content -->
          <div class="p-6">
            <p class="text-sm text-zinc-400 leading-relaxed">${step.description}</p>
          </div>

          <!-- Footer -->
          <div class="p-4 border-t border-zinc-700 bg-zinc-800/30">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                ${steps.map((_, i) => `
                  <button onclick="showStep(${i})" class="progress-dot ${i === index ? 'active' : i < index ? 'completed' : 'upcoming'}"></button>
                `).join('')}
              </div>

              <div class="flex items-center gap-2">
                ${index > 0 ? `
                  <button onclick="showStep(${index - 1})" class="px-3 py-1.5 text-sm border border-zinc-700 hover:bg-zinc-800">
                    ← Back
                  </button>
                ` : ''}
                <button onclick="showStep(${index + 1})" class="px-3 py-1.5 text-sm bg-blue-600 hover:bg-blue-700 ${index === steps.length - 1 ? 'flex items-center gap-1.5' : ''}">
                  ${index === steps.length - 1 ? `
                    Get Started
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                  ` : 'Next →'}
                </button>
              </div>
            </div>

            <div class="text-center">
              <span class="text-xs text-zinc-500 font-mono">${index + 1} / ${steps.length}</span>
            </div>
          </div>
        </div>
      `;

      // Position tooltip
      if (target && step.placement !== 'center') {
        const rect = target.getBoundingClientRect();
        const spacing = 24;
        const tooltipHeight = 300; // Approximate

        switch (step.placement) {
          case 'top':
            tooltip.style.top = (rect.top - tooltipHeight - spacing + window.scrollY) + 'px';
            tooltip.style.left = (rect.left + rect.width / 2 - 200 + window.scrollX) + 'px';
            break;
          case 'bottom':
            tooltip.style.top = (rect.bottom + spacing + window.scrollY) + 'px';
            tooltip.style.left = (rect.left + rect.width / 2 - 200 + window.scrollX) + 'px';
            break;
          case 'left':
            tooltip.style.top = (rect.top + rect.height / 2 - tooltipHeight / 2 + window.scrollY) + 'px';
            tooltip.style.left = (rect.left - 400 - spacing + window.scrollX) + 'px';
            break;
          case 'right':
            tooltip.style.top = (rect.top + rect.height / 2 - tooltipHeight / 2 + window.scrollY) + 'px';
            tooltip.style.left = (rect.right + spacing + window.scrollX) + 'px';
            break;
        }
      } else {
        tooltip.style.top = '50%';
        tooltip.style.left = '50%';
        tooltip.style.transform = 'translate(-50%, -50%)';
      }
    }

    function closeTour() {
      const backdrop = document.querySelector('.backdrop');
      const spotlight = document.querySelector('.spotlight');
      const tooltip = document.querySelector('.tooltip');

      if (backdrop) backdrop.remove();
      if (spotlight) spotlight.remove();
      if (tooltip) tooltip.remove();
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (!document.querySelector('.tooltip')) return;

      if (e.key === 'Escape') {
        closeTour();
      } else if (e.key === 'ArrowRight') {
        showStep(currentStep + 1);
      } else if (e.key === 'ArrowLeft') {
        showStep(currentStep - 1);
      }
    });

    // Auto-start tour
    setTimeout(() => {
      demoTour();
    }, 500);
  </script>

</body>
</html>
